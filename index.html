<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>📄 Word ↔ PDF 互转</title>
    <!-- 引入所需库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #0b0e1a;
            --card-bg: #151b2b;
            --border: #2a3348;
            --text: #e8edf5;
            --text-secondary: #8899bb;
            --accent: #6C3CE1;
            --accent-hover: #8B5CF6;
            --green: #22c55e;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 960px;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--accent), #00D4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: border-color 0.3s;
        }
        .card:hover {
            border-color: var(--accent);
        }
        .card .icon {
            font-size: 2rem;
            text-align: center;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
        }
        .card .desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }
        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(108, 60, 225, 0.05);
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .drop-zone .hint {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .drop-zone .hint .ext {
            font-weight: 600;
            color: var(--text);
        }
        .file-info {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 8px;
            border-left: 3px solid var(--green);
            font-size: 0.85rem;
        }
        .file-info .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 12px;
        }
        .file-info .remove {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
        }
        .file-info .remove:hover {
            color: #ef4444;
        }
        .file-info.show {
            display: flex;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.95rem;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
        }
        .btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .status {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            min-height: 1.4em;
        }
        .status.success {
            color: var(--green);
        }
        .status.error {
            color: #ef4444;
        }

        /* 页脚 */
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📄 Word ↔ PDF 互转</h1>
        <div class="grid">
            <!-- Word 转 PDF -->
            <div class="card" id="word2pdf-card">
                <div class="icon">📝 → 📄</div>
                <h2>Word 转 PDF</h2>
                <div class="desc">上传 .docx 文件，转换为 PDF</div>
                <div class="drop-zone" id="wordDropZone">
                    <input type="file" accept=".docx" id="wordInput" />
                    <div class="hint">拖拽或点击选择 <span class="ext">.docx</span> 文件</div>
                </div>
                <div class="file-info" id="wordFileInfo">
                    <span class="name" id="wordFileName">未命名.docx</span>
                    <button class="remove" id="wordRemoveBtn">✕</button>
                </div>
                <button class="btn" id="wordConvertBtn" disabled>🔄 转换</button>
                <div class="status" id="wordStatus">就绪</div>
            </div>

            <!-- PDF 转 Word -->
            <div class="card" id="pdf2word-card">
                <div class="icon">📄 → 📝</div>
                <h2>PDF 转 Word</h2>
                <div class="desc">上传 .pdf 文件，提取文本并生成 .doc</div>
                <div class="drop-zone" id="pdfDropZone">
                    <input type="file" accept=".pdf" id="pdfInput" />
                    <div class="hint">拖拽或点击选择 <span class="ext">.pdf</span> 文件</div>
                </div>
                <div class="file-info" id="pdfFileInfo">
                    <span class="name" id="pdfFileName">未命名.pdf</span>
                    <button class="remove" id="pdfRemoveBtn">✕</button>
                </div>
                <button class="btn" id="pdfConvertBtn" disabled>🔄 转换</button>
                <div class="status" id="pdfStatus">就绪</div>
            </div>
        </div>
        <div class="footer">
            ⚡ 所有处理在本地浏览器完成，文件不会上传服务器。
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---- DOM 元素 ----
            const wordInput = document.getElementById('wordInput');
            const pdfInput = document.getElementById('pdfInput');
            const wordDropZone = document.getElementById('wordDropZone');
            const pdfDropZone = document.getElementById('pdfDropZone');
            const wordFileInfo = document.getElementById('wordFileInfo');
            const pdfFileInfo = document.getElementById('pdfFileInfo');
            const wordFileName = document.getElementById('wordFileName');
            const pdfFileName = document.getElementById('pdfFileName');
            const wordRemoveBtn = document.getElementById('wordRemoveBtn');
            const pdfRemoveBtn = document.getElementById('pdfRemoveBtn');
            const wordConvertBtn = document.getElementById('wordConvertBtn');
            const pdfConvertBtn = document.getElementById('pdfConvertBtn');
            const wordStatus = document.getElementById('wordStatus');
            const pdfStatus = document.getElementById('pdfStatus');

            // ---- 状态 ----
            let wordFile = null;
            let pdfFile = null;
            let isConverting = false;

            // ---- 辅助函数 ----
            function setStatus(el, msg, type) {
                el.textContent = msg;
                el.className = 'status' + (type ? ' ' + type : '');
            }

            function updateButton(btn, loading, text) {
                if (loading) {
                    btn.disabled = true;
                    btn.innerHTML = `<span class="spinner"></span>处理中...`;
                } else {
                    btn.disabled = false;
                    btn.textContent = text || '🔄 转换';
                }
            }

            // ---- 文件处理（Word转PDF） ----
            function handleWordFile(file) {
                if (!file || file.type !== 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                    setStatus(wordStatus, '请上传 .docx 文件', 'error');
                    return false;
                }
                wordFile = file;
                wordFileName.textContent = file.name;
                wordFileInfo.classList.add('show');
                wordConvertBtn.disabled = false;
                setStatus(wordStatus, `已选择: ${file.name}`, 'success');
                return true;
            }

            function clearWordFile() {
                wordFile = null;
                wordInput.value = '';
                wordFileInfo.classList.remove('show');
                wordConvertBtn.disabled = true;
                setStatus(wordStatus, '就绪');
            }

            // ---- 文件处理（PDF转Word） ----
            function handlePdfFile(file) {
                if (!file || file.type !== 'application/pdf') {
                    setStatus(pdfStatus, '请上传 .pdf 文件', 'error');
                    return false;
                }
                pdfFile = file;
                pdfFileName.textContent = file.name;
                pdfFileInfo.classList.add('show');
                pdfConvertBtn.disabled = false;
                setStatus(pdfStatus, `已选择: ${file.name}`, 'success');
                return true;
            }

            function clearPdfFile() {
                pdfFile = null;
                pdfInput.value = '';
                pdfFileInfo.classList.remove('show');
                pdfConvertBtn.disabled = true;
                setStatus(pdfStatus, '就绪');
            }

            // ---- Word → PDF 转换 ----
            async function convertWordToPdf() {
                if (!wordFile || isConverting) return;
                isConverting = true;
                updateButton(wordConvertBtn, true);
                setStatus(wordStatus, '正在解析 Word...');

                try {
                    // 1. 使用 mammoth 将 docx 转为 HTML
                    const arrayBuffer = await wordFile.arrayBuffer();
                    const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
                    const html = result.value;

                    // 2. 创建一个临时容器渲染 HTML
                    const wrapper = document.createElement('div');
                    wrapper.style.cssText = 'padding: 40px; font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto;';
                    wrapper.innerHTML = html;

                    // 将 wrapper 添加到 body 隐藏区域用于渲染
                    const container = document.createElement('div');
                    container.style.cssText =
                        'position: fixed; left: -9999px; top: 0; width: 800px; background: white; color: black;';
                    container.appendChild(wrapper);
                    document.body.appendChild(container);

                    setStatus(wordStatus, '正在生成 PDF...');

                    // 3. 使用 html2pdf 将 HTML 转为 PDF
                    const pdfBlob = await new Promise((resolve, reject) => {
                        const opt = {
                            margin: [0.5, 0.5, 0.5, 0.5],
                            filename: wordFile.name.replace(/\.docx$/i, '.pdf'),
                            image: { type: 'jpeg', quality: 0.98 },
                            html2canvas: { scale: 2, useCORS: true },
                            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                        };
                        html2pdf()
                            .set(opt)
                            .from(container)
                            .outputPdf('blob')
                            .then(resolve)
                            .catch(reject);
                    });

                    // 移除临时容器
                    document.body.removeChild(container);

                    // 4. 下载
                    const url = URL.createObjectURL(pdfBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = wordFile.name.replace(/\.docx$/i, '.pdf');
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);

                    setStatus(wordStatus, '✅ 转换成功，已下载', 'success');
                } catch (err) {
                    console.error(err);
                    setStatus(wordStatus, '❌ 转换失败: ' + err.message, 'error');
                } finally {
                    isConverting = false;
                    updateButton(wordConvertBtn, false);
                }
            }

            // ---- PDF → Word 转换（提取文本生成 .doc） ----
            async function convertPdfToWord() {
                if (!pdfFile || isConverting) return;
                isConverting = true;
                updateButton(pdfConvertBtn, true);
                setStatus(pdfStatus, '正在解析 PDF...');

                try {
                    // 1. 使用 pdf.js 提取文本
                    const arrayBuffer = await pdfFile.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let fullText = '';
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        const pageText = content.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n\n';
                    }

                    if (!fullText.trim()) {
                        throw new Error('未能提取到文本内容（可能为扫描件）');
                    }

                    // 2. 生成 .doc 文件（Word 可识别的 HTML 格式）
                    const htmlContent = `
                        <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                              xmlns:w='urn:schemas-microsoft-com:office:word' 
                              xmlns='http://www.w3.org/TR/REC-html40'>
                        <head><meta charset="utf-8">
                        <style>
                            body { font-family: Arial, sans-serif; font-size: 12pt; line-height: 1.6; }
                            p { margin: 0 0 8pt 0; }
                        </style>
                        </head>
                        <body>
                            ${fullText.replace(/\n/g, '<br>')}
                        </body>
                        </html>
                    `;

                    const blob = new Blob([htmlContent], { type: 'application/msword;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = pdfFile.name.replace(/\.pdf$/i, '.doc');
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 5000);

                    setStatus(pdfStatus, '✅ 转换成功，已下载', 'success');
                } catch (err) {
                    console.error(err);
                    setStatus(pdfStatus, '❌ 转换失败: ' + err.message, 'error');
                } finally {
                    isConverting = false;
                    updateButton(pdfConvertBtn, false);
                }
            }

            // ---- 事件绑定 ----
            // Word 输入
            wordInput.addEventListener('change', function(e) {
                if (this.files && this.files[0]) {
                    handleWordFile(this.files[0]);
                }
            });
            wordDropZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });
            wordDropZone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
            });
            wordDropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files && files[0]) {
                    handleWordFile(files[0]);
                    // 同步 input 以便下次选择
                    const dt = new DataTransfer();
                    dt.items.add(files[0]);
                    wordInput.files = dt.files;
                }
            });
            wordRemoveBtn.addEventListener('click', clearWordFile);
            wordConvertBtn.addEventListener('click', convertWordToPdf);

            // PDF 输入
            pdfInput.addEventListener('change', function(e) {
                if (this.files && this.files[0]) {
                    handlePdfFile(this.files[0]);
                }
            });
            pdfDropZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });
            pdfDropZone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
            });
            pdfDropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files && files[0]) {
                    handlePdfFile(files[0]);
                    const dt = new DataTransfer();
                    dt.items.add(files[0]);
                    pdfInput.files = dt.files;
                }
            });
            pdfRemoveBtn.addEventListener('click', clearPdfFile);
            pdfConvertBtn.addEventListener('click', convertPdfToWord);

            // ---- 初始化 pdf.js worker ----
            pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        })();
    </script>

</body>
</html>
