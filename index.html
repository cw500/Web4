<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PDF 精准转 Word | 纯前端转换器</title>
  <!-- pdf.js 库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- docx 库 (生成 Word 文档) -->
  <script src="https://unpkg.com/docx@8.2.3/build/index.umd.js"></script>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --primary: #2b6ef0;
      --primary-dark: #1a56d0;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
      --transition: 0.2s ease;
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-bottom: calc(20px + var(--safe-bottom));
    }
    .container {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      border: 1px solid var(--border);
      transition: all var(--transition);
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.02em;
    }
    h1 span {
      background: linear-gradient(135deg, #2b6ef0, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: -8px;
      line-height: 1.5;
    }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: #f8fafc;
      position: relative;
    }
    .upload-zone:hover {
      border-color: var(--primary);
      background: #f0f4ff;
    }
    .upload-zone.drag-over {
      border-color: var(--primary);
      background: #eef2ff;
      transform: scale(1.01);
    }
    .upload-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .upload-text {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 6px;
    }
    .upload-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    input[type="file"] {
      display: none;
    }
    .progress-area {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .progress-area.active {
      display: flex;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2b6ef0, #8b5cf6);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }
    .preview-container {
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .preview-container.active {
      display: flex;
    }
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-header h3 {
      font-weight: 600;
      font-size: 1rem;
    }
    .page-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-height: 250px;
      overflow-y: auto;
      padding: 4px;
    }
    .page-canvas {
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 140px;
      height: auto;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(43,110,240,0.3);
    }
    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: #f0f4ff;
    }
    .note {
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: #f8fafc;
      padding: 12px 16px;
      border-radius: 10px;
      border-left: 4px solid #fbbf24;
      line-height: 1.6;
    }
    @media (max-width: 480px) {
      .container { padding: 24px 16px; }
      h1 { font-size: 1.5rem; }
      .btn { padding: 10px 18px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <span>📄 PDF → Word</span>
    </h1>
    <p class="subtitle">纯前端转换，文件不上传服务器。<br>最大限度保留字体大小与文本位置，生成可编辑的 .docx 文档。</p>

    <!-- 上传区域 -->
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📤</div>
      <div class="upload-text">点击或拖拽 PDF 文件到此处</div>
      <div class="upload-hint">支持最大 50MB 的 PDF 文件</div>
      <input type="file" id="fileInput" accept=".pdf,application/pdf">
    </div>

    <!-- 进度条 -->
    <div class="progress-area" id="progressArea">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text">
        <span id="progressStatus">准备中...</span>
        <span id="progressPercent">0%</span>
      </div>
    </div>

    <!-- 页面预览 -->
    <div class="preview-container" id="previewContainer">
      <div class="preview-header">
        <h3>📖 页面预览</h3>
        <span style="font-size:0.8rem; color:var(--text-secondary);" id="pageCount"></span>
      </div>
      <div class="page-preview" id="pagePreview"></div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button class="btn" id="convertBtn" disabled>
        <span>🔁</span> 开始转换
      </button>
      <button class="btn btn-outline" id="downloadBtn" disabled>
        <span>⬇️</span> 下载 Word 文档
      </button>
    </div>

    <div class="note">
      ⚠️ <strong>重要提示：</strong><br>
      • 纯前端技术基于 pdf.js 与 docx.js 实现。<br>
      • 会尽力提取字体大小、文本内容并按页面排列，但无法 100% 还原复杂排版（如表格、分栏、图片）。<br>
      • 若 PDF 包含扫描图片，转换后仍为图片（不可编辑文字）。<br>
      • 文件处理完全在本地进行，隐私安全。
    </div>
  </div>

  <script>
    (function() {
      // 配置 pdf.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      // DOM 元素
      const uploadZone = document.getElementById('uploadZone');
      const fileInput = document.getElementById('fileInput');
      const progressArea = document.getElementById('progressArea');
      const progressFill = document.getElementById('progressFill');
      const progressStatus = document.getElementById('progressStatus');
      const progressPercent = document.getElementById('progressPercent');
      const previewContainer = document.getElementById('previewContainer');
      const pagePreview = document.getElementById('pagePreview');
      const pageCount = document.getElementById('pageCount');
      const convertBtn = document.getElementById('convertBtn');
      const downloadBtn = document.getElementById('downloadBtn');

      let pdfDoc = null;
      let extractedData = null;   // 存储提取的文本项数据
      let convertedBlob = null;   // 转换后的 docx Blob

      // 重置状态
      function reset() {
        pdfDoc = null;
        extractedData = null;
        convertedBlob = null;
        convertBtn.disabled = true;
        downloadBtn.disabled = true;
        progressArea.classList.remove('active');
        previewContainer.classList.remove('active');
        pagePreview.innerHTML = '';
        pageCount.textContent = '';
        fileInput.value = '';
      }

      // 更新进度
      function updateProgress(percent, status) {
        progressFill.style.width = `${percent}%`;
        progressPercent.textContent = `${Math.round(percent)}%`;
        if (status) progressStatus.textContent = status;
      }

      // 处理文件上传
      function handleFile(file) {
        if (!file || file.type !== 'application/pdf') {
          alert('请选择有效的 PDF 文件');
          return;
        }
        if (file.size > 50 * 1024 * 1024) {
          alert('文件大小不能超过 50MB');
          return;
        }

        reset();
        progressArea.classList.add('active');
        updateProgress(0, '正在加载 PDF...');

        const reader = new FileReader();
        reader.onload = async function(e) {
          try {
            const typedArray = new Uint8Array(e.target.result);
            pdfDoc = await pdfjsLib.getDocument({ data: typedArray }).promise;
            const totalPages = pdfDoc.numPages;
            updateProgress(10, `PDF 加载成功，共 ${totalPages} 页`);

            // 生成页面缩略图预览
            previewContainer.classList.add('active');
            pageCount.textContent = `共 ${totalPages} 页`;
            pagePreview.innerHTML = '';
            for (let i = 1; i <= Math.min(totalPages, 6); i++) {
              const page = await pdfDoc.getPage(i);
              const viewport = page.getViewport({ scale: 0.3 });
              const canvas = document.createElement('canvas');
              canvas.className = 'page-canvas';
              canvas.width = viewport.width;
              canvas.height = viewport.height;
              const ctx = canvas.getContext('2d');
              await page.render({ canvasContext: ctx, viewport }).promise;
              pagePreview.appendChild(canvas);
              updateProgress(10 + (i / totalPages) * 30, `预览第 ${i}/${totalPages} 页`);
            }

            updateProgress(40, '预览完成，点击“开始转换”提取内容');
            convertBtn.disabled = false;
          } catch (err) {
            alert('PDF 解析失败: ' + err.message);
            reset();
          }
        };
        reader.readAsArrayBuffer(file);
      }

      // 提取 PDF 文本内容（含位置、字体大小）
      async function extractPDFData() {
        if (!pdfDoc) throw new Error('没有 PDF 文件');
        const allPagesData = [];
        const totalPages = pdfDoc.numPages;
        updateProgress(45, '正在提取文本内容...');

        for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
          const page = await pdfDoc.getPage(pageNum);
          const textContent = await page.getTextContent();
          const viewport = page.getViewport({ scale: 1 });

          // 整理文本项：包含文本、坐标、字体大小、字体名
          const items = textContent.items.map(item => {
            const tx = item.transform;
            // 从变换矩阵计算字体大小 (通常 scaleY 即为字体高度)
            const fontSize = Math.abs(tx[3]) || 12;
            // 坐标 (左下角)
            const x = tx[4];
            const y = tx[5];
            const fontName = item.fontName || 'unknown';
            return {
              text: item.str,
              x,
              y,
              fontSize,
              fontName,
              width: item.width,
              height: item.height,
            };
          });

          // 按 y 坐标排序（从上到下，y 越大表示越靠下？在 PDF 坐标系中 y 从底部向上，这里使用 viewport 转换）
          // 实际渲染时 y 坐标是从底部开始，需要转换为从顶部开始的坐标以便排序
          const pageHeight = viewport.height;
          items.forEach(item => {
            item.y = pageHeight - item.y; // 转为从上到下的 y
          });

          // 按 y 排序 (同一行合并)
          items.sort((a, b) => a.y - b.y || a.x - b.x);
          allPagesData.push({
            pageNumber: pageNum,
            pageHeight,
            pageWidth: viewport.width,
            items,
          });

          updateProgress(45 + (pageNum / totalPages) * 35, `提取第 ${pageNum}/${totalPages} 页`);
        }
        return allPagesData;
      }

      // 将提取的数据转换为 docx 文档
      function buildDocx(pagesData) {
        const { Document, Paragraph, TextRun, Packer, AlignmentType, HeadingLevel, PageBreak } = docx;

        const children = [];

        pagesData.forEach((page, idx) => {
          if (idx > 0) {
            // 页面间添加分页符 (通过段落属性)
            children.push(new Paragraph({
              children: [],
              pageBreakBefore: true,
            }));
          }

          // 按行分组：y 坐标差值小于 2pt 视为同一行
          const rows = [];
          let currentRow = [];
          let lastY = null;
          const threshold = 2;

          page.items.forEach(item => {
            if (lastY === null || Math.abs(item.y - lastY) <= threshold) {
              currentRow.push(item);
            } else {
              if (currentRow.length) rows.push(currentRow);
              currentRow = [item];
            }
            lastY = item.y;
          });
          if (currentRow.length) rows.push(currentRow);

          // 每一行生成一个段落
          rows.forEach(row => {
            // 按 x 坐标排序
            row.sort((a, b) => a.x - b.x);
            const runs = row.map(item => {
              return new TextRun({
                text: item.text,
                size: Math.round(item.fontSize * 1.2) * 2, // 转换为半点 (half-points)
                font: item.fontName.includes('+') ? item.fontName.split('+')[1] : item.fontName,
                // 简单颜色处理：无法获取，保留默认
              });
            });
            children.push(new Paragraph({
              children: runs,
              spacing: { after: 60, line: 276 },
            }));
          });
        });

        const doc = new Document({
          sections: [{
            properties: {},
            children: children,
          }],
        });

        return Packer.toBlob(doc);
      }

      // 开始转换流程
      async function startConversion() {
        if (!pdfDoc) return;
        convertBtn.disabled = true;
        downloadBtn.disabled = true;
        updateProgress(45, '开始提取文本...');

        try {
          extractedData = await extractPDFData();
          updateProgress(80, '正在生成 Word 文档...');

          convertedBlob = await buildDocx(extractedData);
          updateProgress(100, '转换完成！点击下载按钮保存文件');
          downloadBtn.disabled = false;
        } catch (err) {
          alert('转换失败: ' + err.message);
          console.error(err);
          updateProgress(0, '转换出错');
          convertBtn.disabled = false;
        }
      }

      // 下载 docx
      function downloadDocx() {
        if (!convertedBlob) return;
        const url = URL.createObjectURL(convertedBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'converted.docx';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // 事件绑定
      uploadZone.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
      });

      // 拖拽上传
      uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('drag-over');
      });
      uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('drag-over');
      });
      uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      });

      convertBtn.addEventListener('click', startConversion);
      downloadBtn.addEventListener('click', downloadDocx);

      // 初始状态
      reset();
    })();
  </script>
</body>
</html>
