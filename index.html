<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 聊天室 | 点对点加密</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #e1e5eb;
      --text: #2c3e50;
      --text-light: #6c7a89;
      --accent: #3498db;
      --accent-light: #eaf4fd;
      --red: #e74c3c;
      --green: #2ecc71;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 20px;
      --msg-self: #3498db;
      --msg-other: #f0f2f5;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .container {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
      overflow: hidden;
    }
    /* 头部 */
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .user-info {
      display: flex;
      flex-direction: column;
    }
    .nickname {
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .peer-id {
      font-size: 0.7rem;
      color: var(--text-light);
      background: var(--accent-light);
      padding: 2px 10px;
      border-radius: 12px;
      margin-top: 2px;
      display: inline-block;
      cursor: pointer;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status-badge {
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .status-connected { background: #e6ffed; color: #2ecc71; }
    .status-disconnected { background: #fff5f5; color: #e74c3c; }
    .btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--accent-light);
      color: var(--accent);
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #d4e6fc; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #2c80c5; }

    /* 连接区域 */
    .connect-area {
      padding: 14px 20px;
      background: #fafbfc;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .connect-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
      outline: none;
    }
    .connect-input:focus { border-color: var(--accent); }

    /* 聊天消息区 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f9fafc;
    }
    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .message.self { align-self: flex-end; }
    .message.other { align-self: flex-start; }
    .message-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .message.self .message-bubble {
      background: var(--msg-self);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.other .message-bubble {
      background: var(--msg-other);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .message-time {
      font-size: 0.65rem;
      color: var(--text-light);
      margin-top: 3px;
      margin-left: 8px;
      margin-right: 8px;
    }
    .system-msg {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-light);
      padding: 4px 0;
    }

    /* 输入区 */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: white;
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .msg-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      outline: none;
      resize: none;
    }
    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .send-btn:hover { background: #2c80c5; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }

    .footer-note {
      text-align: center;
      font-size: 0.65rem;
      color: #aaa;
      padding: 6px;
    }

    @media (max-width: 480px) {
      .container { height: 100vh; max-height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- 头部 -->
  <div class="header">
    <div class="user-info">
      <div class="nickname">
        <span id="nickDisplay">😊 加载中...</span>
        <span class="status-badge status-disconnected" id="connStatus">未连接</span>
      </div>
      <span class="peer-id" id="myPeerId" title="点击复制我的ID" onclick="copyPeerId()">🔗 生成ID中...</span>
    </div>
    <button class="btn" id="editNickBtn" onclick="editNickname()">✏️ 改名</button>
  </div>

  <!-- 连接对方 -->
  <div class="connect-area">
    <input type="text" class="connect-input" id="remotePeerId" placeholder="输入对方的 Peer ID">
    <button class="btn btn-primary" id="connectBtn" onclick="connectToPeer()">连接</button>
    <button class="btn" id="disconnectBtn" onclick="disconnect()" style="display:none;">断开</button>
  </div>

  <!-- 聊天记录 -->
  <div class="chat-area" id="chatArea">
    <div class="system-msg">✨ 欢迎使用点对点聊天，您的身份已自动生成</div>
    <div class="system-msg">📋 请分享您的 Peer ID 给对方，并输入对方 ID 建立连接</div>
  </div>

  <!-- 消息输入 -->
  <div class="input-area">
    <input type="text" class="msg-input" id="messageInput" placeholder="输入消息..." onkeypress="handleKey(event)">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="footer-note">🔒 点对点加密 · 纯前端 · 无服务器存储</div>
</div>

<!-- 引入 PeerJS -->
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

<script>
  (function() {
    // ---------- 全局变量 ----------
    let peer = null;
    let conn = null;
    let myPeerId = '';
    let myNickname = '';

    const nickDisplay = document.getElementById('nickDisplay');
    const myPeerIdSpan = document.getElementById('myPeerId');
    const connStatus = document.getElementById('connStatus');
    const remotePeerInput = document.getElementById('remotePeerId');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // ---------- 工具函数 ----------
    function formatTime() {
      const now = new Date();
      return now.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
    }

    function addSystemMsg(text) {
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      chatArea.appendChild(div);
      scrollToBottom();
    }

    function addMessage(text, isSelf) {
      const div = document.createElement('div');
      div.className = `message ${isSelf ? 'self' : 'other'}`;
      div.innerHTML = `
        <div class="message-bubble">${escapeHtml(text)}</div>
        <div class="message-time">${formatTime()}</div>
      `;
      chatArea.appendChild(div);
      scrollToBottom();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function updateConnectionStatus(connected) {
      if (connected) {
        connStatus.textContent = '已连接';
        connStatus.className = 'status-badge status-connected';
        connectBtn.style.display = 'none';
        disconnectBtn.style.display = 'inline-block';
      } else {
        connStatus.textContent = '未连接';
        connStatus.className = 'status-badge status-disconnected';
        connectBtn.style.display = 'inline-block';
        disconnectBtn.style.display = 'none';
      }
    }

    // 复制 Peer ID
    window.copyPeerId = function() {
      if (!myPeerId) return;
      navigator.clipboard.writeText(myPeerId).then(() => {
        alert('✅ Peer ID 已复制到剪贴板');
      }).catch(() => {
        prompt('复制失败，请手动复制：', myPeerId);
      });
    };

    // 修改昵称
    window.editNickname = function() {
      const newNick = prompt('请输入新的昵称（最多12字）', myNickname);
      if (newNick && newNick.trim()) {
        myNickname = newNick.trim().substring(0, 12);
        localStorage.setItem('p2p_nickname', myNickname);
        updateNickDisplay();
        if (conn) {
          conn.send({ type: 'nickname', nickname: myNickname });
        }
      }
    };

    function updateNickDisplay() {
      nickDisplay.innerHTML = `😊 ${escapeHtml(myNickname)}`;
    }

    // 生成随机昵称
    function generateRandomNick() {
      const adjectives = ['快乐的', '勇敢的', '可爱的', '聪明的', '酷酷的', '闪亮的', '神秘的', '活泼的'];
      const nouns = ['小新', '小白', '风间', '妮妮', '阿呆', '正男', '广志', '美伢'];
      const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
      const noun = nouns[Math.floor(Math.random() * nouns.length)];
      return adj + noun;
    }

    // ---------- PeerJS 初始化 ----------
    function initPeer() {
      // 获取或生成昵称
      myNickname = localStorage.getItem('p2p_nickname');
      if (!myNickname) {
        myNickname = generateRandomNick();
        localStorage.setItem('p2p_nickname', myNickname);
      }
      updateNickDisplay();

      // 创建 Peer，使用 PeerJS 公共信令服务器
      peer = new Peer(undefined, {
        debug: 0 // 0: 无日志, 1: 错误, 2: 警告, 3: 全部
      });

      peer.on('open', (id) => {
        myPeerId = id;
        myPeerIdSpan.textContent = `🔗 ${id}`;
        myPeerIdSpan.title = '点击复制';
        addSystemMsg('👤 您的 Peer ID 已生成，请分享给对方');
      });

      // 收到连接请求
      peer.on('connection', (connection) => {
        if (conn) {
          connection.on('open', () => {
            connection.send({ type: 'system', text: '对方已断开旧连接，请重新连接' });
            connection.close();
          });
          return;
        }
        conn = connection;
        setupConnection(conn);
      });

      peer.on('disconnected', () => {
        addSystemMsg('⚠️ 与信令服务器断开，尝试重连...');
        peer.reconnect();
      });

      peer.on('error', (err) => {
        console.error('Peer error:', err);
        addSystemMsg('❌ 发生错误: ' + err.message);
      });
    }

    // 建立连接后的处理
    function setupConnection(connection) {
      conn = connection;
      conn.on('open', () => {
        updateConnectionStatus(true);
        addSystemMsg('🔗 已与对方建立连接！');
        // 发送自己的昵称给对方
        conn.send({ type: 'nickname', nickname: myNickname });
      });

      conn.on('data', (data) => {
        if (data.type === 'message') {
          addMessage(data.text, false);
        } else if (data.type === 'nickname') {
          // 可以显示对方昵称，此处简单处理
          addSystemMsg(`👤 对方昵称：${escapeHtml(data.nickname)}`);
        } else if (data.type === 'system') {
          addSystemMsg(data.text);
        }
      });

      conn.on('close', () => {
        addSystemMsg('🔌 对方已断开连接');
        updateConnectionStatus(false);
        conn = null;
      });

      conn.on('error', (err) => {
        console.error('Connection error:', err);
        addSystemMsg('⚠️ 连接出错');
      });
    }

    // 主动连接
    window.connectToPeer = function() {
      const remoteId = remotePeerInput.value.trim();
      if (!remoteId) {
        alert('请输入对方的 Peer ID');
        return;
      }
      if (remoteId === myPeerId) {
        alert('不能连接自己哦');
        return;
      }
      if (conn) {
        alert('已经有一个连接了，请先断开');
        return;
      }
      const connection = peer.connect(remoteId, { reliable: true });
      conn = connection;
      setupConnection(connection);
    };

    // 断开连接
    window.disconnect = function() {
      if (conn) {
        conn.close();
        conn = null;
      }
      updateConnectionStatus(false);
      addSystemMsg('🔌 你已断开连接');
    };

    // 发送消息
    window.sendMessage = function() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!conn || !conn.open) {
        alert('未连接，无法发送消息');
        return;
      }
      conn.send({ type: 'message', text: text });
      addMessage(text, true);
      messageInput.value = '';
      messageInput.focus();
    };

    // 回车发送
    window.handleKey = function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    };

    // 页面卸载时关闭连接
    window.addEventListener('beforeunload', () => {
      if (conn) conn.close();
      if (peer) peer.destroy();
    });

    // 启动
    initPeer();

    // 初始加载示例
    setTimeout(() => {
      if (!myPeerId) {
        addSystemMsg('⏳ 正在生成ID，请稍候...');
      }
    }, 2000);
  })();
</script>
</body>
</html>
