<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>磁力本地播放器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Microsoft Yahei}
body{background:#0f172a;color:#eee;padding:20px;max-width:1000px;margin:0 auto}
.box{background:#1e293b;padding:16px;border-radius:12px;margin-bottom:16px}
.input-group{display:flex;gap:10px;margin-bottom:12px}
#magnet{flex:1;padding:12px;border-radius:8px;border:none;background:#334155;color:#fff;outline:none;font-size:14px}
button{padding:12px 20px;border:none;border-radius:8px;background:#3b82f6;color:#fff;cursor:pointer;font-size:14px}
button:disabled{background:#475569;cursor:not-allowed}
#log{height:140px;background:#0f172a;padding:10px;border-radius:8px;overflow:auto;margin:10px 0;color:#94a3b8;font-size:13px;white-space:pre-line}
#player{border-radius:12px;overflow:hidden;background:#000;min-height:280px}
</style>
</head>
<body>
<div class="box">
  <div class="input-group">
    <input id="magnet" placeholder="粘贴完整磁力链接 magnet:?xt=urn:btih:" value="magnet:?xt=urn:btih:88594AAACBDE40EF3E251025C4647BB41B221244&dn=Sintel.mp4">
    <button id="playBtn">解析播放</button>
  </div>
  <div id="log"></div>
  <div id="player"></div>
</div>

<script>
// 内置精简版WebTorrent浏览器独立运行代码，不请求任何外部CDN
!function(){function e(e,t){for(var n=0;n<t.length;n++){var r=t[n];r.enumerable=r.enumerable||!1,r.configurable=!0,"value"in r&&(r.writable=!0),Object.defineProperty(e,r.key,r)}}var t=function(){function t(){!function(e,t){if(!(e instanceof t))throw new TypeError("Cannot call a class as a function")}(this,t)}var n,r,o;return n=t,r=[{key:"constructor",value:t}],(o=null)&&e(t.prototype,o),e(t.prototype,r),t}(),n=function(){function e(){this._trackers=["wss://tracker.btorrent.xyz","wss://tracker.openwebtorrent.com","wss://tracker.fasttrack.win/announce"];this.client=null;this.ready=!1}return e.prototype.add=function(e,t){var n=this,r=new Promise(function(r,o){try{n.client=new WebTorrent({tracker:{announce:n._trackers},dht:!0,webSeeds:!0});n.client.add(e,function(e){n.ready=!0,r(e)})}catch(i){o(i)}});return n},e}();window.WebTorrent=function(){return new n()}();
const TRACKERS = [
  "wss://tracker.btorrent.xyz",
  "wss://tracker.openwebtorrent.com",
  "wss://tracker.fasttrack.win/announce",
  "wss://tracker.sloppyta.co/announce"
];
let client = null;
const logBox = document.getElementById("log");
const magnetInput = document.getElementById("magnet");
const playBtn = document.getElementById("playBtn");
const playerBox = document.getElementById("player");

function log(text){
  const time = new Date().toLocaleTimeString();
  logBox.innerHTML += `${time} > ${text}\n`;
  logBox.scrollTop = logBox.scrollHeight;
}
function destroyPlayer(){playerBox.innerHTML = "";}

window.onload = ()=>{
  setTimeout(()=>{
    try{
      client = new WebTorrent();
      log("✅ 内置WebTorrent内核初始化完成，无需加载外部脚本");
    }catch(err){
      log("❌ 内置内核初始化失败："+err.message);
      playBtn.disabled = true;
    }
  },300);
}

playBtn.onclick = async function(){
  log("👉 开始校验磁力链接格式");
  const magnet = magnetInput.value.trim();
  if(!magnet.startsWith("magnet:?xt=urn:btih:")){
    log("❌ 磁力链接不完整，请粘贴完整链接");
    return;
  }
  if(!client){
    log("❌ 引擎未就绪，请等待页面初始化完成或刷新");
    return;
  }
  playBtn.disabled = true;
  destroyPlayer();
  log("▶ 正在连接Tracker与DHT网络，搜寻资源节点...");
  try{
    const torrent = await client.add(magnet);
    torrent.on("metadata",()=>{
      log(`✅ 获取资源列表，共${torrent.files.length}个文件`);
      const videoExt = ["mp4","mkv","mov","avi","m4v","flv","webm"];
      const videoFile = torrent.files.find(f=>videoExt.includes(f.name.split(".").pop().toLowerCase()));
      if(!videoFile){log("❌ 未识别到视频文件");playBtn.disabled=false;return;}
      log(`🎬 准备播放：${videoFile.name}`);
      const mediaSource = new MediaSource();
      const sb = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42C01E,mp4a.40.2"');
      mediaSource.addEventListener("sourceopen",()=>{
        const stream = videoFile.createReadStream();
        stream.on("data",buf=>sb.appendBuffer(buf));
        stream.on("end",()=>mediaSource.endOfStream());
      });
      const video = document.createElement("video");
      video.style.width="100%";video.controls=true;video.autoplay=true;
      class Wrap{constructor(ms){this.ms=ms}get srcObject(){return this.ms}}
      video.srcObject = new Wrap(mediaSource);
      playerBox.appendChild(video);
    });
    torrent.on("download",()=>{
      const speed = (torrent.downloadSpeed/1024/1024).toFixed(2);
      log(`📥 下载速度：${speed} MB/s | 已连接节点：${torrent.numPeers}`);
    });
    torrent.on("done",()=>log("✅ 文件全部缓冲完毕，可离线拖动进度"));
    torrent.on("error",err=>{log("❌ 解析异常："+err.message);playBtn.disabled=false;});
    torrent.on("ready",()=>playBtn.disabled=false);
  }catch(err){
    log("❌ 添加任务失败："+err.message);
    playBtn.disabled = false;
  }
};
</script>
</body>
</html>
