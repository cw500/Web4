<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>磁力播放器·纯本地内置版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Microsoft Yahei,sans-serif}
body{background:#0f172a;color:#f1f5f9;padding:20px;max-width:1000px;margin:0 auto}
.box{background:#1e293b;padding:16px;border-radius:12px;margin-bottom:14px}
.bar{display:flex;gap:10px;margin-bottom:12px}
#magnet{flex:1;padding:12px 14px;background:#334155;border:0;border-radius:8px;color:#fff;outline:none;font-size:14px}
#btnPlay{padding:12px 20px;background:#2563eb;color:#fff;border:0;border-radius:8px;cursor:pointer}
#btnPlay:disabled{background:#475569;cursor:not-allowed}
#log{height:140px;background:#0b1120;padding:10px;border-radius:8px;overflow:auto;color:#a5b4fc;font-size:13px;white-space:pre-line;line-height:1.4}
#player{min-height:280px;background:#000;border-radius:12px;overflow:hidden;margin-top:10px}
video{width:100%;display:block}
</style>
</head>
<body>
<div class="box">
  <div class="bar">
    <input id="magnet" value="magnet:?xt=urn:btih:88594AAACBDE40EF3E251025C4647BB41B221244&dn=Sintel.mp4" placeholder="粘贴磁力链接 magnet:?xt=urn:btih:">
    <button id="btnPlay">解析播放</button>
  </div>
  <div id="log"></div>
  <div id="player"></div>
</div>

<!-- 内置 WebTorrent 官方独立编译版，全局 WebTorrent 构造函数，无外部依赖 -->

// 页面业务代码
const logDom = document.getElementById('log');
const inputDom = document.getElementById('magnet');
const btnDom = document.getElementById('btnPlay');
const playerDom = document.getElementById('player');
let client = null;

function log(text) {
  const time = new Date().toLocaleTimeString();
  logDom.innerHTML += `${time} > ${text}\n`;
  logDom.scrollTop = logDom.scrollHeight;
}
function clearPlayer() { playerDom.innerHTML = ''; }

// 页面加载初始化
window.addEventListener('load', () => {
  setTimeout(() => {
    try {
      client = new WebTorrent();
      log('✅ WebTorrent 内核初始化成功，无外部CDN依赖');
    } catch (err) {
      log('❌ 初始化失败：' + err.message);
      btnDom.disabled = true;
    }
  }, 300);
});

btnDom.onclick = async () => {
  const magnet = inputDom.value.trim();
  log('👉 校验磁力链接');
  if (!magnet.startsWith('magnet:?xt=urn:btih:')) {
    log('❌ 链接不是标准magnet格式');
    return;
  }
  if (!client) {
    log('❌ 内核未就绪，刷新页面重试');
    return;
  }
  btnDom.disabled = true;
  clearPlayer();
  log('▶ 正在连接DHT与Tracker节点...');

  try {
    const torrent = await client.add(magnet);
    torrent.on('metadata', () => {
      log(`✅ 获取资源信息，共${torrent.files.length}个文件`);
      // 自动匹配视频文件
      const videoExt = ['mp4','mkv','mov','avi','m4v','flv','webm'];
      const videoFile = torrent.files.find(f => videoExt.includes(f.name.split('.').pop().toLowerCase()));
      if (!videoFile) {
        log('❌ 未找到可播放视频');
        btnDom.disabled = false;
        return;
      }
      log(`🎬 播放：${videoFile.name}`);
      // 原生video播放器
      const video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.style.width = '100%';
      videoFile.renderTo(video);
      playerDom.appendChild(video);
    });
    torrent.on('download', () => {
      const speed = (torrent.downloadSpeed / 1024 / 1024).toFixed(2);
      log(`📥 下载速度：${speed} MB/s | 在线节点：${torrent.numPeers}`);
    });
    torrent.on('done', () => log('✅ 文件缓冲完成，可拖拽进度'));
    torrent.on('error', err => {
      log('❌ 任务异常：' + err.message);
      btnDom.disabled = false;
    });
    torrent.on('ready', () => btnDom.disabled = false);
  } catch (err) {
    log('❌ 添加任务失败：' + err.message);
    btnDom.disabled = false;
  }
};
</script>
</body>
</html>
