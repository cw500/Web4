<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PDF 精准转 Word · 排版增强版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/docx@8.2.3/build/index.umd.js"></script>
  <style>
    :root {
      --bg: #f5f7fa; --card: #ffffff; --primary: #2b6ef0; --primary-dark: #1a56d0;
      --text: #1e293b; --text-secondary: #64748b; --border: #e2e8f0; --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 680px; background: var(--card); border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 32px 24px; display: flex; flex-direction: column; gap: 24px; border: 1px solid var(--border); }
    h1 { font-size: 1.8rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    h1 span { background: linear-gradient(135deg, #2b6ef0, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; }
    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f8fafc; }
    .upload-zone:hover { border-color: var(--primary); background: #f0f4ff; }
    .upload-zone.drag-over { border-color: var(--primary); background: #eef2ff; }
    .upload-icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-text { font-weight: 600; font-size: 1.1rem; }
    .upload-hint { font-size: 0.8rem; color: var(--text-secondary); }
    input[type="file"] { display: none; }
    .progress-area { display: none; flex-direction: column; gap: 8px; }
    .progress-area.active { display: flex; }
    .progress-bar { width:100%; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
    .progress-fill { width:0%; height:100%; background:linear-gradient(90deg, #2b6ef0, #8b5cf6); border-radius:4px; transition: width 0.3s ease; }
    .progress-text { font-size:0.85rem; color:var(--text-secondary); display:flex; justify-content:space-between; }
    .preview-container { display: none; flex-direction: column; gap: 12px; }
    .preview-container.active { display: flex; }
    .page-preview { display: flex; flex-wrap: wrap; gap: 10px; max-height: 200px; overflow-y: auto; }
    .page-canvas { border:1px solid var(--border); border-radius:6px; width:120px; background:#fff; }
    .actions { display: flex; gap: 12px; }
    .btn { padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(43,110,240,0.3); }
    .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); box-shadow: none; }
    .btn-outline:hover { background: #f0f4ff; }
    .note { font-size: 0.8rem; color: var(--text-secondary); background: #f8fafc; padding: 12px 16px; border-radius: 10px; border-left: 4px solid #fbbf24; line-height: 1.6; }
    @media (max-width: 480px) { .container { padding: 24px 16px; } h1 { font-size: 1.5rem; } .btn { padding: 10px 18px; font-size: 0.9rem; } }
  </style>
</head>
<body>
<div class="container">
  <h1><span>📄 PDF 转 Word</span></h1>
  <p class="subtitle">增强排版还原：对齐、缩进、字体样式、表格外框<br>完全本地处理，隐私安全</p>

  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📤</div>
    <div class="upload-text">点击或拖拽 PDF 文件</div>
    <div class="upload-hint">最大 50MB，上传后需手动点击“开始转换”</div>
    <input type="file" id="fileInput" accept=".pdf,application/pdf">
  </div>

  <div class="progress-area" id="progressArea">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text">
      <span id="progressStatus">准备中...</span>
      <span id="progressPercent">0%</span>
    </div>
  </div>

  <div class="preview-container" id="previewContainer">
    <div class="page-preview" id="pagePreview"></div>
  </div>

  <div class="actions">
    <button class="btn" id="convertBtn" disabled>🔁 开始转换</button>
    <button class="btn btn-outline" id="downloadBtn" disabled>⬇️ 下载 Word 文档</button>
  </div>

  <div class="note">
    ⚠️ <strong>改进说明：</strong>自动检测段落对齐与缩进，表格外框清晰，字体样式（粗/斜）智能推断。复杂布局（分栏、浮动图片）仍可能不完全一致。
  </div>
</div>

<script>
(function() {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const progressArea = document.getElementById('progressArea');
  const progressFill = document.getElementById('progressFill');
  const progressStatus = document.getElementById('progressStatus');
  const progressPercent = document.getElementById('progressPercent');
  const previewContainer = document.getElementById('previewContainer');
  const pagePreview = document.getElementById('pagePreview');
  const convertBtn = document.getElementById('convertBtn');
  const downloadBtn = document.getElementById('downloadBtn');

  let pdfDoc = null;
  let extractedData = null;
  let convertedBlob = null;

  function reset() {
    pdfDoc = null; extractedData = null; convertedBlob = null;
    convertBtn.disabled = true; downloadBtn.disabled = true;
    progressArea.classList.remove('active'); previewContainer.classList.remove('active');
    pagePreview.innerHTML = ''; fileInput.value = '';
  }

  function updateProgress(percent, status) {
    progressFill.style.width = `${percent}%`;
    progressPercent.textContent = `${Math.round(percent)}%`;
    if (status) progressStatus.textContent = status;
  }

  function handleFile(file) {
    if (!file || file.type !== 'application/pdf') return alert('请选择有效的 PDF 文件');
    if (file.size > 50 * 1024 * 1024) return alert('文件大小不能超过 50MB');

    reset();
    progressArea.classList.add('active');
    updateProgress(0, '正在加载 PDF...');

    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const typedArray = new Uint8Array(e.target.result);
        pdfDoc = await pdfjsLib.getDocument({ data: typedArray }).promise;
        const totalPages = pdfDoc.numPages;
        updateProgress(10, `PDF 加载成功，共 ${totalPages} 页`);

        previewContainer.classList.add('active');
        pagePreview.innerHTML = '';
        for (let i = 1; i <= Math.min(totalPages, 6); i++) {
          const page = await pdfDoc.getPage(i);
          const viewport = page.getViewport({ scale: 0.3 });
          const canvas = document.createElement('canvas');
          canvas.className = 'page-canvas';
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          pagePreview.appendChild(canvas);
          updateProgress(10 + (i / totalPages) * 30, `预览第 ${i}/${totalPages} 页`);
        }
        updateProgress(40, '预览完成，点击“开始转换”');
        convertBtn.disabled = false;
      } catch (err) {
        alert('PDF 解析失败: ' + err.message);
        reset();
      }
    };
    reader.readAsArrayBuffer(file);
  }

  async function extractPDFData() {
    if (!pdfDoc) throw new Error('没有 PDF 文件');
    const allPagesData = [];
    const totalPages = pdfDoc.numPages;
    updateProgress(45, '正在提取文本内容...');

    for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
      const page = await pdfDoc.getPage(pageNum);
      const textContent = await page.getTextContent();
      const viewport = page.getViewport({ scale: 1 });
      const items = [];

      textContent.items.forEach(item => {
        const tx = item.transform;
        const fontSize = Math.abs(tx[3]) || 12;
        let fontName = item.fontName || 'unknown';
        let bold = false, italic = false;
        const lowerName = fontName.toLowerCase();
        if (lowerName.includes('bold') || lowerName.includes('black') || lowerName.includes('heavy')) bold = true;
        if (lowerName.includes('italic') || lowerName.includes('oblique')) italic = true;
        if (Math.abs(tx[1]) > 0.5 || Math.abs(tx[2]) > 0.5) italic = true;

        items.push({
          text: item.str,
          x: tx[4],
          y: viewport.height - tx[5],
          fontSize,
          fontName,
          bold,
          italic,
          width: item.width,
          height: item.height,
        });
      });

      items.sort((a, b) => a.y - b.y || a.x - b.x);
      allPagesData.push({
        pageNumber: pageNum,
        pageWidth: viewport.width,
        pageHeight: viewport.height,
        items,
      });
      updateProgress(45 + (pageNum / totalPages) * 35, `提取第 ${pageNum}/${totalPages} 页`);
    }
    return allPagesData;
  }

  function groupItemsIntoRows(items, yThreshold = 1.5, xGapThreshold = 5) {
    const rows = [];
    const sorted = [...items].sort((a, b) => a.y - b.y || a.x - b.x);
    let currentRow = [];
    let lastY = null;

    for (const item of sorted) {
      if (lastY === null || Math.abs(item.y - lastY) <= yThreshold) {
        currentRow.push(item);
      } else {
        if (currentRow.length) rows.push(currentRow);
        currentRow = [item];
      }
      lastY = item.y;
    }
    if (currentRow.length) rows.push(currentRow);

    const splitRows = [];
    for (const row of rows) {
      row.sort((a, b) => a.x - b.x);
      const subRows = [];
      let subRow = [row[0]];
      for (let i = 1; i < row.length; i++) {
        const prev = row[i - 1];
        const curr = row[i];
        if (curr.x - (prev.x + prev.width) > xGapThreshold) {
          subRows.push(subRow);
          subRow = [curr];
        } else {
          subRow.push(curr);
        }
      }
      subRows.push(subRow);
      splitRows.push(...subRows);
    }
    return splitRows;
  }

  function detectTableBlocks(rows) {
    const blocks = [];
    let i = 0;
    while (i < rows.length) {
      const row = rows[i];
      if (row.length < 2) {
        blocks.push({ type: 'paragraph', rows: [row] });
        i++;
        continue;
      }

      let j = i + 1;
      while (j < rows.length && rows[j].length === row.length) {
        let aligned = true;
        for (let col = 0; col < row.length; col++) {
          const x1 = row[col].x;
          const x2 = rows[j][col].x;
          if (Math.abs(x1 - x2) > 5) {
            aligned = false;
            break;
          }
        }
        if (!aligned) break;
        j++;
      }

      if (j - i >= 2) {
        const tableRows = rows.slice(i, j);
        blocks.push({ type: 'table', rows: tableRows });
        i = j;
      } else {
        blocks.push({ type: 'paragraph', rows: [row] });
        i++;
      }
    }
    return blocks;
  }

  function buildDocx(pagesData) {
    const { Document, Paragraph, TextRun, Packer, Table, TableRow, TableCell, WidthType, BorderStyle, AlignmentType, convertInchesToTwip } = docx;

    // 内联对齐检测函数（现在可访问 AlignmentType）
    function detectAlignment(row, pageWidth) {
      if (row.length === 0) return AlignmentType.LEFT;
      const firstX = row[0].x;
      const lastX = row[row.length - 1].x + row[row.length - 1].width;
      const margin = 20;
      const center = pageWidth / 2;
      const rowCenter = (firstX + lastX) / 2;

      if (Math.abs(firstX - margin) < 15 && Math.abs(lastX - (pageWidth - margin)) < 30) {
        return AlignmentType.JUSTIFIED;
      } else if (Math.abs(rowCenter - center) < 20) {
        return AlignmentType.CENTER;
      } else if (Math.abs(lastX - (pageWidth - margin)) < 15) {
        return AlignmentType.RIGHT;
      }
      return AlignmentType.LEFT;
    }

    const children = [];

    pagesData.forEach((page, pageIdx) => {
      if (pageIdx > 0) {
        children.push(new Paragraph({ children: [], pageBreakBefore: true }));
      }

      const rows = groupItemsIntoRows(page.items);
      const blocks = detectTableBlocks(rows);

      blocks.forEach(block => {
        if (block.type === 'paragraph') {
          const row = block.rows[0];
          if (row.length === 0) return;
          const alignment = detectAlignment(row, page.pageWidth);
          const runs = row.map(item => new TextRun({
            text: item.text,
            size: Math.round(item.fontSize * 1.2) * 2,
            font: item.fontName.includes('+') ? item.fontName.split('+')[1] : item.fontName,
            bold: item.bold,
            italics: item.italic,
          }));

          let indent = 0;
          if (row[0].x > 30) indent = Math.round(row[0].x / 2);

          children.push(new Paragraph({
            children: runs,
            alignment,
            indent: indent > 0 ? { left: indent } : undefined,
            spacing: { after: 60, line: 276 },
          }));
        } else {
          const tableRows = block.rows;
          const colCount = tableRows[0].length;
          const tableChildren = tableRows.map(rowItems => {
            const cells = [];
            for (let c = 0; c < colCount; c++) {
              const item = rowItems[c] || { text: '', fontSize: 12, fontName: 'unknown', bold: false, italic: false };
              cells.push(new TableCell({
                children: [new Paragraph({
                  children: [new TextRun({
                    text: item.text || '',
                    size: Math.round((item.fontSize || 12) * 1.2) * 2,
                    font: (item.fontName || '').includes('+') ? item.fontName.split('+')[1] : item.fontName,
                    bold: item.bold,
                    italics: item.italic,
                  })],
                  alignment: AlignmentType.LEFT,
                })],
                width: { size: 100 / colCount, type: WidthType.PERCENTAGE },
              }));
            }
            return new TableRow({ children: cells });
          });

          children.push(new Table({
            rows: tableChildren,
            width: { size: 100, type: WidthType.PERCENTAGE },
            borders: {
              top: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
              bottom: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
              left: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
              right: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
              insideHorizontal: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
              insideVertical: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
            },
          }));
        }
      });
    });

    const firstPage = pagesData[0];
    const pageWidthTwip = Math.round(firstPage.pageWidth * 20);
    const pageHeightTwip = Math.round(firstPage.pageHeight * 20);

    const doc = new Document({
      sections: [{
        properties: {
          pageSize: { width: pageWidthTwip, height: pageHeightTwip },
          margin: {
            top: convertInchesToTwip(0.5),
            bottom: convertInchesToTwip(0.5),
            left: convertInchesToTwip(0.5),
            right: convertInchesToTwip(0.5),
          },
        },
        children,
      }],
    });

    return Packer.toBlob(doc);
  }

  async function startConversion() {
    if (!pdfDoc) return;
    convertBtn.disabled = true;
    downloadBtn.disabled = true;
    updateProgress(45, '开始提取文本...');

    try {
      extractedData = await extractPDFData();
      updateProgress(80, '正在生成 Word 文档（增强排版）...');
      convertedBlob = await buildDocx(extractedData);
      updateProgress(100, '转换完成！下载后查看效果');
      downloadBtn.disabled = false;
    } catch (err) {
      alert('转换失败: ' + err.message);
      console.error(err);
      updateProgress(0, '转换出错');
      convertBtn.disabled = false;
    }
  }

  function downloadDocx() {
    if (!convertedBlob) return;
    const url = URL.createObjectURL(convertedBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'converted.docx';
    a.click();
    URL.revokeObjectURL(url);
  }

  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  convertBtn.addEventListener('click', startConversion);
  downloadBtn.addEventListener('click', downloadDocx);
  reset();
})();
</script>
</body>
</html>
