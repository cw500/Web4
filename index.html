<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 聊天室 | 点对点加密</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #e1e5eb;
      --text: #2c3e50;
      --text-light: #6c7a89;
      --accent: #3498db;
      --accent-light: #eaf4fd;
      --red: #e74c3c;
      --green: #2ecc71;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 20px;
      --msg-self: #3498db;
      --msg-other: #f0f2f5;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .container {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      flex-wrap: wrap;
      gap: 8px;
    }
    .user-info {
      display: flex;
      flex-direction: column;
    }
    .nickname {
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .peer-id-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .peer-id {
      font-size: 0.7rem;
      color: var(--text-light);
      background: var(--accent-light);
      padding: 2px 10px;
      border-radius: 12px;
      cursor: pointer;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
    }
    .copy-btn {
      background: var(--accent-light);
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 8px;
      border-radius: 10px;
      transition: 0.2s;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .copy-btn:hover {
      background: #d4e6fc;
    }
    .status-badge {
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .status-connected { background: #e6ffed; color: #2ecc71; }
    .status-disconnected { background: #fff5f5; color: #e74c3c; }
    .status-connecting { background: #fff8e1; color: #f39c12; }
    .btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--accent-light);
      color: var(--accent);
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #d4e6fc; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #2c80c5; }

    .connect-area {
      padding: 14px 20px;
      background: #fafbfc;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .connect-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
      outline: none;
    }
    .connect-input:focus { border-color: var(--accent); }

    .server-select {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      cursor: pointer;
      margin-left: 4px;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f9fafc;
    }
    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .message.self { align-self: flex-end; }
    .message.other { align-self: flex-start; }
    .message-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .message.self .message-bubble {
      background: var(--msg-self);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.other .message-bubble {
      background: var(--msg-other);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .message-time {
      font-size: 0.65rem;
      color: var(--text-light);
      margin-top: 3px;
      margin-left: 8px;
      margin-right: 8px;
    }
    .system-msg {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-light);
      padding: 4px 0;
    }

    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: white;
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .msg-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      outline: none;
      resize: none;
    }
    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .send-btn:hover { background: #2c80c5; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }

    .footer-note {
      text-align: center;
      font-size: 0.65rem;
      color: #aaa;
      padding: 6px;
    }

    @media (max-width: 480px) {
      .container { height: 100vh; max-height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="user-info">
      <div class="nickname">
        <span id="nickDisplay">😊 加载中...</span>
        <span class="status-badge status-connecting" id="connStatus">连接中</span>
      </div>
      <div class="peer-id-row">
        <span class="peer-id" id="myPeerId" title="点击复制我的ID" onclick="copyPeerId()">🔗 生成ID中...</span>
        <button class="copy-btn" onclick="copyPeerId()" title="复制ID">📋</button>
        <select class="server-select" id="serverSelect" onchange="switchServer()">
          <option value="0.peerjs.com">默认服务器</option>
          <option value="0.peerjs.com:443">服务器2</option>
        </select>
      </div>
    </div>
    <button class="btn" id="editNickBtn" onclick="editNickname()">✏️ 改名</button>
  </div>

  <div class="connect-area">
    <input type="text" class="connect-input" id="remotePeerId" placeholder="输入对方的 Peer ID">
    <button class="btn btn-primary" id="connectBtn" onclick="connectToPeer()">连接</button>
    <button class="btn" id="disconnectBtn" onclick="disconnect()" style="display:none;">断开</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="system-msg">✨ 欢迎使用点对点聊天，您的身份已自动生成</div>
    <div class="system-msg">📋 请分享您的 Peer ID 给对方，并输入对方 ID 建立连接</div>
  </div>

  <div class="input-area">
    <input type="text" class="msg-input" id="messageInput" placeholder="输入消息..." onkeypress="handleKey(event)">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="footer-note">🔒 点对点加密 · 自动重连 · 纯前端</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

<script>
  (function() {
    let peer = null;
    let conn = null;
    let myPeerId = '';
    let myNickname = '';
    let currentServer = '0.peerjs.com';
    let serverRetryCount = 0;
    const MAX_RETRIES = 5;
    let manualDisconnect = false;      // 是否主动断开
    let remotePeerIdSaved = '';        // 保存对方ID用于重连
    let heartbeatTimer = null;
    let heartbeatTimeout = null;
    let reconnectTimer = null;

    const SIGNALING_SERVERS = [
      { host: '0.peerjs.com', port: 443, secure: true },
      { host: '0.peerjs.com', port: 80, secure: false },
    ];

    const nickDisplay = document.getElementById('nickDisplay');
    const myPeerIdSpan = document.getElementById('myPeerId');
    const connStatus = document.getElementById('connStatus');
    const remotePeerInput = document.getElementById('remotePeerId');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const serverSelect = document.getElementById('serverSelect');

    function formatTime() {
      return new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
    }

    function addSystemMsg(text) {
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      chatArea.appendChild(div);
      scrollToBottom();
    }

    function addMessage(text, isSelf) {
      const div = document.createElement('div');
      div.className = `message ${isSelf ? 'self' : 'other'}`;
      div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div><div class="message-time">${formatTime()}</div>`;
      chatArea.appendChild(div);
      scrollToBottom();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function updateConnectionStatus(connected) {
      if (connected) {
        connStatus.textContent = '已连接';
        connStatus.className = 'status-badge status-connected';
        connectBtn.style.display = 'none';
        disconnectBtn.style.display = 'inline-block';
      } else {
        connStatus.textContent = '未连接';
        connStatus.className = 'status-badge status-disconnected';
        connectBtn.style.display = 'inline-block';
        disconnectBtn.style.display = 'none';
      }
    }

    function updatePeerStatus(status) {
      switch(status) {
        case 'connecting': connStatus.textContent = '连接中'; connStatus.className = 'status-badge status-connecting'; break;
        case 'connected': connStatus.textContent = '在线'; connStatus.className = 'status-badge status-connected'; break;
        case 'disconnected': connStatus.textContent = '离线'; connStatus.className = 'status-badge status-disconnected'; break;
      }
    }

    window.copyPeerId = function() {
      if (!myPeerId) return;
      navigator.clipboard.writeText(myPeerId).then(() => addSystemMsg('✅ Peer ID 已复制'))
        .catch(() => prompt('复制失败，请手动复制：', myPeerId));
    };

    window.editNickname = function() {
      const newNick = prompt('请输入新的昵称（最多12字）', myNickname);
      if (newNick && newNick.trim()) {
        myNickname = newNick.trim().substring(0, 12);
        localStorage.setItem('p2p_nickname', myNickname);
        updateNickDisplay();
        if (conn && conn.open) conn.send({ type: 'nickname', nickname: myNickname });
      }
    };

    function updateNickDisplay() {
      nickDisplay.innerHTML = `😊 ${escapeHtml(myNickname)}`;
    }

    function generateRandomNick() {
      const adjectives = ['快乐的', '勇敢的', '可爱的', '聪明的', '酷酷的', '闪亮的', '神秘的', '活泼的'];
      const nouns = ['小新', '小白', '风间', '妮妮', '阿呆', '正男', '广志', '美伢'];
      return adjectives[Math.floor(Math.random() * adjectives.length)] + nouns[Math.floor(Math.random() * nouns.length)];
    }

    // ---------- 心跳机制 ----------
    function startHeartbeat() {
      stopHeartbeat();
      heartbeatTimer = setInterval(() => {
        if (conn && conn.open) {
          conn.send({ type: 'ping' });
        }
      }, 3000); // 每3秒发送ping

      heartbeatTimeout = setTimeout(() => {
        addSystemMsg('💔 心跳超时，对方可能已离线');
        handleConnectionLost();
      }, 15000); // 15秒未收到任何数据则超时
    }

    function stopHeartbeat() {
      if (heartbeatTimer) clearInterval(heartbeatTimer);
      if (heartbeatTimeout) clearTimeout(heartbeatTimeout);
      heartbeatTimer = null;
      heartbeatTimeout = null;
    }

    function resetHeartbeatTimeout() {
      if (heartbeatTimeout) {
        clearTimeout(heartbeatTimeout);
        heartbeatTimeout = setTimeout(() => {
          addSystemMsg('💔 心跳超时，对方可能已离线');
          handleConnectionLost();
        }, 15000);
      }
    }

    // 连接丢失处理 (自动重连)
    function handleConnectionLost() {
      if (manualDisconnect) return;
      if (conn) {
        try { conn.close(); } catch(e) {}
        conn = null;
      }
      updateConnectionStatus(false);
      stopHeartbeat();
      if (remotePeerIdSaved && peer && !peer.destroyed) {
        addSystemMsg('🔄 尝试自动重连...');
        attemptReconnect();
      } else {
        addSystemMsg('⚠️ 连接已断开，请重新输入对方ID连接');
      }
    }

    function attemptReconnect() {
      if (!remotePeerIdSaved || !peer || peer.destroyed) return;
      if (conn) return; // 已有连接
      addSystemMsg(`🔁 正在重连到 ${remotePeerIdSaved}...`);
      const connection = peer.connect(remotePeerIdSaved, { reliable: true });
      conn = connection;
      setupConnection(conn);
    }

    // ---------- 初始化Peer ----------
    function initPeer(serverConfig) {
      if (peer) {
        peer.destroy();
      }
      const config = serverConfig || SIGNALING_SERVERS[0];
      currentServer = `${config.host}:${config.port}`;
      
      updatePeerStatus('connecting');
      addSystemMsg(`🔄 正在连接信令服务器 ${currentServer}...`);

      peer = new Peer(undefined, {
        host: config.host,
        port: config.port,
        secure: config.secure,
        debug: 0,
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        }
      });

      peer.on('open', (id) => {
        myPeerId = id;
        myPeerIdSpan.textContent = `🔗 ${id}`;
        updatePeerStatus('connected');
        serverRetryCount = 0;
        addSystemMsg('✅ 已连接到信令服务器，您的 ID 已生成');
        // 如果之前有对方ID且断开状态，尝试重连
        if (remotePeerIdSaved && !conn && !manualDisconnect) {
          attemptReconnect();
        }
      });

      peer.on('connection', (connection) => {
        if (conn && conn !== connection) {
          connection.on('open', () => {
            connection.send({ type: 'system', text: '对方已断开旧连接，请刷新' });
            connection.close();
          });
          return;
        }
        conn = connection;
        setupConnection(conn);
      });

      peer.on('disconnected', () => {
        updatePeerStatus('disconnected');
        addSystemMsg('⚠️ 与信令服务器断开，尝试重连...');
        if (serverRetryCount < MAX_RETRIES) {
          serverRetryCount++;
          setTimeout(() => {
            const nextServer = SIGNALING_SERVERS[serverRetryCount % SIGNALING_SERVERS.length];
            initPeer(nextServer);
          }, 2000);
        } else {
          addSystemMsg('❌ 多次重连失败，请手动刷新页面');
        }
      });

      peer.on('error', (err) => {
        console.error(err);
        if (err.type === 'unavailable-id') {
          addSystemMsg('❌ ID 不可用，重新生成...');
          peer.destroy();
          setTimeout(() => initPeer(serverConfig), 1000);
        } else if (err.type === 'network' || err.type === 'server-error') {
          if (serverRetryCount < MAX_RETRIES) {
            serverRetryCount++;
            setTimeout(() => initPeer(SIGNALING_SERVERS[serverRetryCount % SIGNALING_SERVERS.length]), 2000);
          }
        } else {
          addSystemMsg('❌ 错误: ' + err.message);
        }
      });
    }

    function setupConnection(connection) {
      conn = connection;
      conn.on('open', () => {
        updateConnectionStatus(true);
        addSystemMsg('🔗 已与对方建立连接！');
        conn.send({ type: 'nickname', nickname: myNickname });
        startHeartbeat();
        // 保存对方ID（从连接的peer属性获取，或使用输入的ID）
        remotePeerIdSaved = conn.peer;
        remotePeerInput.value = remotePeerIdSaved;
      });

      conn.on('data', (data) => {
        resetHeartbeatTimeout(); // 任何数据都重置心跳超时
        if (data.type === 'message') {
          addMessage(data.text, false);
        } else if (data.type === 'nickname') {
          addSystemMsg(`👤 对方昵称：${escapeHtml(data.nickname)}`);
        } else if (data.type === 'ping') {
          // 回应pong
          conn.send({ type: 'pong' });
        } else if (data.type === 'pong') {
          // 收到pong，心跳正常
        } else if (data.type === 'system') {
          addSystemMsg(data.text);
        }
      });

      conn.on('close', () => {
        addSystemMsg('🔌 对方已断开连接');
        updateConnectionStatus(false);
        stopHeartbeat();
        conn = null;
        if (!manualDisconnect) {
          addSystemMsg('⏳ 将在5秒后尝试自动重连...');
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(() => {
            if (!manualDisconnect && remotePeerIdSaved) attemptReconnect();
          }, 5000);
        }
      });

      conn.on('error', (err) => {
        console.error(err);
        addSystemMsg('⚠️ 连接出错');
        updateConnectionStatus(false);
        stopHeartbeat();
        conn = null;
      });

      // 监控ICE连接状态
      if (conn.peerConnection) {
        conn.peerConnection.oniceconnectionstatechange = () => {
          const state = conn.peerConnection.iceConnectionState;
          if (state === 'disconnected' || state === 'failed') {
            addSystemMsg('🌐 网络连接不稳定');
            // 不立即断开，等待心跳超时处理
          }
        };
      }
    }

    window.switchServer = function() {
      const selected = serverSelect.value;
      const parts = selected.split(':');
      const config = {
        host: parts[0],
        port: parseInt(parts[1] || '443'),
        secure: parts[1] === '443' || !parts[1]
      };
      addSystemMsg('🔄 手动切换信令服务器...');
      serverRetryCount = 0;
      initPeer(config);
    };

    window.connectToPeer = function() {
      const remoteId = remotePeerInput.value.trim();
      if (!remoteId) return alert('请输入对方的 Peer ID');
      if (remoteId === myPeerId) return alert('不能连接自己');
      if (conn) return alert('已经有一个连接了，请先断开');
      if (!peer || peer.destroyed) return alert('信令服务器未连接');
      remotePeerIdSaved = remoteId;
      manualDisconnect = false;
      const connection = peer.connect(remoteId, { reliable: true });
      conn = connection;
      setupConnection(conn);
      addSystemMsg('⏳ 正在连接对方...');
    };

    window.disconnect = function() {
      manualDisconnect = true;
      if (conn) {
        conn.close();
        conn = null;
      }
      stopHeartbeat();
      clearTimeout(reconnectTimer);
      updateConnectionStatus(false);
      addSystemMsg('🔌 你已主动断开连接');
      remotePeerIdSaved = ''; // 清空保存ID，不再自动重连
    };

    window.sendMessage = function() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!conn || !conn.open) return alert('未连接，无法发送消息');
      conn.send({ type: 'message', text: text });
      addMessage(text, true);
      messageInput.value = '';
      messageInput.focus();
    };

    window.handleKey = function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    };

    // 页面可见性变化处理
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        // 页面恢复可见，检查连接状态
        if (peer && (peer.destroyed || !peer.id)) {
          addSystemMsg('🔄 页面恢复，重新连接信令服务器...');
          initPeer(SIGNALING_SERVERS[0]);
        } else if (!conn && remotePeerIdSaved && !manualDisconnect) {
          addSystemMsg('🔄 尝试恢复对等连接...');
          attemptReconnect();
        }
      }
    });

    window.addEventListener('beforeunload', () => {
      if (conn) conn.close();
      if (peer) peer.destroy();
      stopHeartbeat();
    });

    // 初始加载
    myNickname = localStorage.getItem('p2p_nickname') || generateRandomNick();
    localStorage.setItem('p2p_nickname', myNickname);
    updateNickDisplay();
    initPeer(SIGNALING_SERVERS[0]);
  })();
</script>
</body>
</html>
