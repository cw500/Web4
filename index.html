<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>磁力链接在线播放器 - Magnet Player</title>
    <meta name="description" content="在线磁力链接解析播放器，支持边下边播，全终端适配">
    <meta name="theme-color" content="#0f0f1a">
    <style>
        :root {
            --bg: #0a0a14;
            --bg-card: #13131f;
            --bg-card-hover: #1a1a2e;
            --bg-input: #0d0d1a;
            --text: #e0e0f0;
            --text-secondary: #a0a0c0;
            --text-muted: #6a6a8a;
            --accent: #7c5cfc;
            --accent-glow: #7c5cfc55;
            --accent-light: #9d85ff;
            --accent-gradient: linear-gradient(135deg, #7c5cfc 0%, #5b8def 50%, #4ec9b0 100%);
            --danger: #ff4d6a;
            --success: #4ec9b0;
            --warning: #f0a060;
            --border: #1e1e35;
            --border-light: #2a2a45;
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px var(--accent-glow), 0 0 80px rgba(124, 92, 252, 0.15);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'JetBrains Mono', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            line-height: 1.6;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124, 92, 252, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 50% at 80% 80%, rgba(78, 201, 176, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 30% 40% at 20% 70%, rgba(91, 141, 239, 0.04) 0%, transparent 60%);
            background-attachment: fixed;
        }

        /* ============ 主容器 ============ */
        .app-wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 20px 16px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        /* ============ 头部 ============ */
        .header {
            text-align: center;
            padding: 8px 0 4px;
        }
        .header .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .header .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: var(--shadow-glow);
            flex-shrink: 0;
        }
        .header .logo-text {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.02em;
        }

        /* ============ 输入区域 ============ */
        .input-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            box-shadow: var(--shadow-card);
            transition: border-color var(--transition);
        }
        .input-section:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-card), 0 0 0 4px rgba(124, 92, 252, 0.08);
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-wrapper {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .input-wrapper .icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--text-muted);
            pointer-events: none;
            z-index: 1;
            transition: color var(--transition);
        }
        .input-wrapper:focus-within .icon-left {
            color: var(--accent-light);
        }
        .magnet-input {
            width: 100%;
            padding: 13px 14px 13px 40px;
            border-radius: var(--radius);
            border: 1.5px solid var(--border-light);
            background: var(--bg-input);
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font-sans);
            outline: none;
            transition: all var(--transition);
            letter-spacing: 0.01em;
        }
        .magnet-input::placeholder {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .magnet-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.1);
        }
        .magnet-input.has-value {
            border-color: #3a3a55;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 12px 22px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            white-space: nowrap;
            font-family: var(--font-sans);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            min-height: 46px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 16px rgba(124, 92, 252, 0.35);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.15) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: shimmer 2.5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%,
            100% {
                background-position: 200% 200%;
            }
            50% {
                background-position: -200% -200%;
            }
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(124, 92, 252, 0.5);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(30%);
        }
        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text);
            border: 1.5px solid var(--border-light);
        }
        .btn-secondary:hover {
            background: #222240;
            border-color: #3a3a60;
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid rgba(255, 77, 106, 0.4);
        }
        .btn-danger:hover {
            background: rgba(255, 77, 106, 0.1);
            border-color: var(--danger);
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 0.8rem;
            border-radius: var(--radius-sm);
            min-height: 36px;
        }
        .btn-xs {
            padding: 5px 10px;
            font-size: 0.72rem;
            border-radius: 8px;
            min-height: 28px;
            gap: 4px;
        }

        /* ============ 状态栏 ============ */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0;
            transition: all var(--transition);
        }
        .stats-bar.hidden {
            display: none;
        }
        .stat-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            font-size: 0.78rem;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all var(--transition);
        }
        .stat-chip .stat-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .stat-chip .stat-dot.active {
            background: var(--success);
            box-shadow: 0 0 8px rgba(78, 201, 176, 0.6);
            animation: pulse-dot 1.8s ease-in-out infinite;
        }
        .stat-chip .stat-dot.connecting {
            background: var(--warning);
            box-shadow: 0 0 8px rgba(240, 160, 96, 0.5);
            animation: pulse-dot 1s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.35;
            }
        }
        .stat-value {
            font-weight: 600;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            font-family: var(--font-mono);
            font-size: 0.76rem;
        }

        /* ============ 主内容区 ============ */
        .main-content {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 300px;
        }
        .main-content.empty {
            display: none;
        }

        /* 文件列表面板 */
        .file-panel {
            width: 280px;
            flex-shrink: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all var(--transition);
        }
        .file-panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }
        .file-panel-header .count-badge {
            font-size: 0.7rem;
            background: var(--accent);
            color: #fff;
            padding: 3px 9px;
            border-radius: 12px;
            font-weight: 500;
        }
        .file-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 6px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .file-list::-webkit-scrollbar {
            width: 4px;
        }
        .file-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .file-list::-webkit-scrollbar-thumb {
            background: #2a2a45;
            border-radius: 10px;
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 2px;
            border: 1.5px solid transparent;
            position: relative;
            text-decoration: none;
            color: inherit;
        }
        .file-item:hover {
            background: var(--bg-card-hover);
            border-color: #2a2a48;
        }
        .file-item.active {
            background: rgba(124, 92, 252, 0.12);
            border-color: rgba(124, 92, 252, 0.4);
        }
        .file-item.playing {
            background: rgba(78, 201, 176, 0.1);
            border-color: rgba(78, 201, 176, 0.35);
        }
        .file-item .file-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            background: #1a1a30;
        }
        .file-item.video-file .file-icon {
            background: rgba(124, 92, 252, 0.2);
            color: #9d85ff;
        }
        .file-item.audio-file .file-icon {
            background: rgba(240, 160, 96, 0.2);
            color: #f0a060;
        }
        .file-item.other-file .file-icon {
            background: rgba(160, 160, 200, 0.15);
            color: #a0a0c0;
        }
        .file-item .file-info {
            flex: 1;
            min-width: 0;
        }
        .file-item .file-name {
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .file-item .file-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 1px;
        }
        .file-item .file-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 0 2px 0 0;
            transition: width 0.4s ease;
            opacity: 0.7;
        }

        /* 播放器面板 */
        .player-panel {
            flex: 1;
            min-width: 0;
            background: #000;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid var(--border);
        }
        .player-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
            min-height: 300px;
        }
        .player-container video {
            width: 100%;
            height: 100%;
            max-height: 65vh;
            object-fit: contain;
            outline: none;
            border-radius: 0;
        }
        .player-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: var(--text-muted);
            text-align: center;
            padding: 40px 20px;
        }
        .player-placeholder .ph-icon {
            font-size: 3.5rem;
            opacity: 0.5;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .player-placeholder .ph-text {
            font-size: 0.9rem;
            max-width: 280px;
            line-height: 1.5;
        }
        .player-placeholder .ph-hint {
            font-size: 0.75rem;
            color: #555;
        }

        /* 无文件提示 */
        .no-files-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 30px;
            color: var(--text-muted);
            text-align: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        /* ============ 底部 ============ */
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.7;
            letter-spacing: 0.03em;
        }
        .footer a {
            color: var(--accent-light);
            text-decoration: none;
        }

        /* ============ Toast提示 ============ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
            color: #fff;
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1), fadeOut 0.3s 2.2s ease forwards;
            pointer-events: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            max-width: 380px;
            word-break: break-word;
        }
        .toast.success {
            background: #1a3a2e;
            border: 1px solid #2e6b4f;
            color: #7ee8c0;
        }
        .toast.error {
            background: #3a1a22;
            border: 1px solid #6b2e3a;
            color: #ff8a9a;
        }
        .toast.info {
            background: #1a253a;
            border: 1px solid #2e406b;
            color: #9dbfff;
        }
        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-8px);
            }
        }

        /* ============ 响应式设计 ============ */
        @media (max-width: 768px) {
            .app-wrapper {
                padding: 12px 10px 30px;
                gap: 14px;
            }
            .header .logo-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
                border-radius: 8px;
            }
            .header .logo-text {
                font-size: 1.15rem;
            }
            .input-section {
                padding: 14px;
                border-radius: var(--radius);
            }
            .input-row {
                gap: 8px;
            }
            .magnet-input {
                padding: 11px 12px 11px 36px;
                font-size: 0.82rem;
                border-radius: var(--radius-sm);
            }
            .input-wrapper .icon-left {
                left: 11px;
                font-size: 0.95rem;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.82rem;
                border-radius: var(--radius-sm);
                min-height: 40px;
            }
            .btn-sm {
                padding: 7px 12px;
                font-size: 0.75rem;
                min-height: 32px;
            }
            .main-content {
                flex-direction: column;
                gap: 12px;
            }
            .file-panel {
                width: 100%;
                max-height: 220px;
                border-radius: var(--radius);
            }
            .file-list {
                max-height: 160px;
            }
            .player-container {
                min-height: 220px;
                border-radius: var(--radius);
            }
            .player-container video {
                max-height: 50vh;
            }
            .player-panel {
                border-radius: var(--radius);
            }
            .stats-bar {
                gap: 6px;
            }
            .stat-chip {
                padding: 6px 10px;
                font-size: 0.7rem;
                border-radius: 16px;
                gap: 4px;
            }
            .stat-value {
                font-size: 0.7rem;
            }
            .toast-container {
                top: auto;
                bottom: 16px;
                right: 10px;
                left: 10px;
                align-items: stretch;
            }
            .toast {
                max-width: 100%;
                font-size: 0.78rem;
                padding: 10px 14px;
            }
            .player-placeholder .ph-icon {
                font-size: 2.5rem;
            }
            .player-placeholder .ph-text {
                font-size: 0.8rem;
                max-width: 240px;
            }
        }
        @media (max-width: 400px) {
            .input-row {
                flex-direction: column;
                gap: 8px;
            }
            .input-wrapper {
                min-width: 100%;
            }
            .btn-primary {
                width: 100%;
                justify-content: center;
            }
            .magnet-input {
                font-size: 0.78rem;
                padding: 10px 10px 10px 34px;
            }
            .header .logo-text {
                font-size: 1rem;
            }
        }
        @media (min-width: 1400px) {
            .app-wrapper {
                max-width: 1300px;
            }
            .file-panel {
                width: 320px;
            }
            .player-container video {
                max-height: 70vh;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">▶</div>
                <div>
                    <div class="logo-text">Magnet Player</div>
                    <div class="subtitle">在线磁力链接解析 · 边下边播</div>
                </div>
            </div>
        </header>

        <!-- 输入区域 -->
        <section class="input-section" id="inputSection">
            <div class="input-row">
                <div class="input-wrapper">
                    <span class="icon-left">🧲</span>
                    <input
                    type="text"
                    class="magnet-input"
                    id="magnetInput"
                    placeholder="粘贴磁力链接 magnet:?xt=urn:btih:..."
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    >
                </div>
                <button class="btn btn-primary" id="btnParse" title="解析并播放">
                    <span>🔍</span> 解析播放
                </button>
                <button class="btn btn-danger btn-sm" id="btnStop" title="停止当前任务" style="display:none;">
                    <span>⏹</span> 停止
                </button>
            </div>
        </section>

        <!-- 状态栏 -->
        <div class="stats-bar hidden" id="statsBar">
            <span class="stat-chip">
                <span class="stat-dot connecting" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </span>
            <span class="stat-chip">
                📥 <span class="stat-value" id="downloadSpeed">0 B/s</span>
            </span>
            <span class="stat-chip">
                📤 <span class="stat-value" id="uploadSpeed">0 B/s</span>
            </span>
            <span class="stat-chip">
                🔗 <span class="stat-value" id="peerCount">0 节点</span>
            </span>
            <span class="stat-chip">
                📊 <span class="stat-value" id="progressPercent">0%</span>
            </span>
        </div>

        <!-- 主内容区 -->
        <div class="main-content empty" id="mainContent">
            <!-- 文件列表 -->
            <aside class="file-panel" id="filePanel">
                <div class="file-panel-header">
                    📁 文件列表 <span class="count-badge" id="fileCount">0</span>
                </div>
                <div class="file-list" id="fileList">
                    <div class="no-files-hint">等待元数据加载...</div>
                </div>
            </aside>

            <!-- 播放器 -->
            <div class="player-panel" id="playerPanel">
                <div class="player-container" id="playerContainer">
                    <div class="player-placeholder" id="playerPlaceholder">
                        <div class="ph-icon">🎬</div>
                        <div class="ph-text">输入磁力链接开始播放</div>
                        <div class="ph-hint">支持 MP4 / WebM / MOV 等格式</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <footer class="footer">
            <span>基于 WebTorrent 技术 · 纯浏览器端P2P · 数据不经过服务器</span>
        </footer>
    </div>

    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- WebTorrent CDN -->
    <script src="https://cdn.bootcdn.net/ajax/libs/webtorrent/2.2.1/webtorrent.min.js"></script>
    </script>

    <script>
        (function() {
            // ============ DOM元素 ============
            const magnetInput = document.getElementById('magnetInput');
            const btnParse = document.getElementById('btnParse');
            const btnStop = document.getElementById('btnStop');
            const statsBar = document.getElementById('statsBar');
            const mainContent = document.getElementById('mainContent');
            const fileList = document.getElementById('fileList');
            const fileCount = document.getElementById('fileCount');
            const playerContainer = document.getElementById('playerContainer');
            const playerPlaceholder = document.getElementById('playerPlaceholder');
            const toastContainer = document.getElementById('toastContainer');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const downloadSpeedEl = document.getElementById('downloadSpeed');
            const uploadSpeedEl = document.getElementById('uploadSpeed');
            const peerCountEl = document.getElementById('peerCount');
            const progressPercentEl = document.getElementById('progressPercent');

            // ============ 状态 ============
            let webTorrentClient = null;
            let currentTorrent = null;
            let currentFileIndex = -1;
            let currentVideoElement = null;
            let isActive = false;
            let statsInterval = null;
            let lastDownloaded = 0;
            let lastUploaded = 0;
            let lastStatsTime = Date.now();

            // ============ 初始化WebTorrent客户端 ============
            function getClient() {
                if (!webTorrentClient) {
                    webTorrentClient = new WebTorrent({
                        tracker: {
                            rtcConfig: {
                                iceServers: [
                                    { urls: 'stun:stun.l.google.com:19302' },
                                    { urls: 'stun:global.stun.twilio.com:3478' },
                                ]
                            },
                            announce: [
                                'wss://tracker.webtorrent.dev',
                                'wss://tracker.files.fm:7073/announce',
                                'wss://tracker.openwebtorrent.com',
                            ]
                        },
                        maxConns: 55,
                    });
                }
                return webTorrentClient;
            }

            // ============ 工具函数 ============
            function formatBytes(bytes) {
                if (bytes === 0 || bytes === null || bytes === undefined) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(Math.abs(bytes)) / Math.log(k));
                const sizeIndex = Math.min(i, sizes.length - 1);
                const val = bytes / Math.pow(k, sizeIndex);
                return val.toFixed(val < 10 ? 1 : 0) + ' ' + sizes[sizeIndex];
            }

            function formatSpeed(bytesPerSec) {
                if (!bytesPerSec || bytesPerSec <= 0) return '0 B/s';
                return formatBytes(bytesPerSec) + '/s';
            }

            function getFileExtension(filename) {
                const parts = filename.split('.');
                return parts.length > 1 ? parts.pop().toLowerCase() : '';
            }

            function isVideoFile(filename) {
                const ext = getFileExtension(filename);
                const videoExts = ['mp4', 'webm', 'mov', 'm4v', 'ogv', 'ogg', 'mkv', 'avi', 'flv', 'wmv', '3gp', 'ts',
                    'mts', 'm2ts'
                ];
                return videoExts.includes(ext);
            }

            function isAudioFile(filename) {
                const ext = getFileExtension(filename);
                const audioExts = ['mp3', 'aac', 'flac', 'wav', 'ogg', 'opus', 'm4a', 'wma'];
                return audioExts.includes(ext);
            }

            function isPlayableVideo(filename) {
                const ext = getFileExtension(filename);
                // 浏览器原生支持的格式
                const playableExts = ['mp4', 'webm', 'mov', 'm4v', 'ogv', 'ogg'];
                return playableExts.includes(ext);
            }

            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                toastContainer.appendChild(toast);
                // 自动移除
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 2600);
            }

            // ============ 停止当前任务 ============
            function stopCurrentTask() {
                if (statsInterval) {
                    clearInterval(statsInterval);
                    statsInterval = null;
                }
                if (currentVideoElement) {
                    try {
                        currentVideoElement.pause();
                        currentVideoElement.removeAttribute('src');
                        currentVideoElement.load();
                    } catch (e) { /* ignore */ }
                    if (currentVideoElement.parentNode) {
                        currentVideoElement.remove();
                    }
                    currentVideoElement = null;
                }
                if (currentTorrent) {
                    try {
                        currentTorrent.destroy();
                    } catch (e) { /* ignore */ }
                    currentTorrent = null;
                }
                currentFileIndex = -1;
                isActive = false;
                lastDownloaded = 0;
                lastUploaded = 0;
                lastStatsTime = Date.now();

                // 恢复UI
                updateUIState(false);
                fileList.innerHTML = '<div class="no-files-hint">等待元数据加载...</div>';
                fileCount.textContent = '0';
                playerPlaceholder.style.display = 'flex';
                if (playerPlaceholder.querySelector('.ph-text')) {
                    playerPlaceholder.querySelector('.ph-text').textContent = '输入磁力链接开始播放';
                }
                updateStatsDisplay(0, 0, 0, 0, 'idle');
            }

            // ============ UI状态更新 ============
            function updateUIState(active) {
                if (active) {
                    btnParse.style.display = 'none';
                    btnStop.style.display = 'inline-flex';
                    statsBar.classList.remove('hidden');
                    mainContent.classList.remove('empty');
                    magnetInput.disabled = true;
                } else {
                    btnParse.style.display = 'inline-flex';
                    btnStop.style.display = 'none';
                    statsBar.classList.add('hidden');
                    mainContent.classList.add('empty');
                    magnetInput.disabled = false;
                }
            }

            function updateStatsDisplay(downloadSpeed, uploadSpeed, peers, progress, status) {
                downloadSpeedEl.textContent = formatSpeed(downloadSpeed);
                uploadSpeedEl.textContent = formatSpeed(uploadSpeed);
                peerCountEl.textContent = peers + ' 节点';
                progressPercentEl.textContent = Math.round(progress * 100) + '%';

                if (status === 'downloading') {
                    statusDot.className = 'stat-dot active';
                    statusText.textContent = '下载中';
                } else if (status === 'connecting') {
                    statusDot.className = 'stat-dot connecting';
                    statusText.textContent = '连接节点中...';
                } else if (status === 'seeding') {
                    statusDot.className = 'stat-dot active';
                    statusText.textContent = '已完成 · 做种中';
                } else if (status === 'idle') {
                    statusDot.className = 'stat-dot';
                    statusText.textContent = '就绪';
                }
            }

            // ============ 渲染文件列表 ============
            function renderFileList(torrent) {
                const files = torrent.files;
                fileCount.textContent = files.length;
                fileList.innerHTML = '';

                if (files.length === 0) {
                    fileList.innerHTML = '<div class="no-files-hint">暂无文件</div>';
                    return;
                }

                // 排序：视频文件优先，然后按大小降序
                const sortedFiles = [...files].sort((a, b) => {
                    const aVideo = isVideoFile(a.name);
                    const bVideo = isVideoFile(b.name);
                    if (aVideo && !bVideo) return -1;
                    if (!aVideo && bVideo) return 1;
                    return b.length - a.length;
                });

                sortedFiles.forEach((file, index) => {
                    const originalIndex = files.indexOf(file);
                    const isVideo = isVideoFile(file.name);
                    const isAudio = isAudioFile(file.name);
                    let fileClass = 'other-file';
                    let iconEmoji = '📄';
                    if (isVideo) {
                        fileClass = 'video-file';
                        iconEmoji = '🎬';
                    } else if (isAudio) {
                        fileClass = 'audio-file';
                        iconEmoji = '🎵';
                    }

                    const fileItem = document.createElement('div');
                    fileItem.className = `file-item ${fileClass}`;
                    if (originalIndex === currentFileIndex) {
                        fileItem.classList.add('playing');
                    }
                    fileItem.dataset.fileIndex = originalIndex;
                    fileItem.innerHTML = `
                        <div class="file-icon">${iconEmoji}</div>
                        <div class="file-info">
                            <div class="file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</div>
                            <div class="file-meta">${formatBytes(file.length)}${isVideo ? ' · 视频' : isAudio ? ' · 音频' : ''}</div>
                        </div>
                        <div class="file-progress-bar" style="width:${(file.progress || 0) * 100}%;"></div>
                    `;

                    fileItem.addEventListener('click', () => {
                        playFile(originalIndex);
                    });

                    fileList.appendChild(fileItem);
                });

                // 自动选择第一个视频文件
                const firstVideoIndex = sortedFiles.findIndex(f => isVideoFile(f.name));
                if (firstVideoIndex >= 0 && currentFileIndex < 0) {
                    const actualIndex = files.indexOf(sortedFiles[firstVideoIndex]);
                    playFile(actualIndex);
                } else if (currentFileIndex < 0 && files.length > 0) {
                    // 没有视频文件，尝试播放第一个文件
                    playFile(0);
                }
            }

            function updateFileProgress(torrent) {
                const items = fileList.querySelectorAll('.file-item');
                items.forEach(item => {
                    const idx = parseInt(item.dataset.fileIndex);
                    if (!isNaN(idx) && idx < torrent.files.length) {
                        const progressBar = item.querySelector('.file-progress-bar');
                        if (progressBar) {
                            progressBar.style.width = (torrent.files[idx].progress * 100) + '%';
                        }
                    }
                });
            }

            function highlightPlayingFile(fileIndex) {
                const items = fileList.querySelectorAll('.file-item');
                items.forEach(item => {
                    item.classList.remove('playing', 'active');
                    if (parseInt(item.dataset.fileIndex) === fileIndex) {
                        item.classList.add('playing');
                    }
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============ 播放文件 ============
            function playFile(fileIndex) {
                if (!currentTorrent || fileIndex < 0 || fileIndex >= currentTorrent.files.length) return;

                currentFileIndex = fileIndex;
                const file = currentTorrent.files[fileIndex];

                // 清理之前的视频元素
                if (currentVideoElement) {
                    try {
                        currentVideoElement.pause();
                        currentVideoElement.removeAttribute('src');
                        currentVideoElement.load();
                    } catch (e) { /* ignore */ }
                    if (currentVideoElement.parentNode) {
                        currentVideoElement.remove();
                    }
                    currentVideoElement = null;
                }

                // 隐藏占位符
                playerPlaceholder.style.display = 'none';

                // 创建新的video元素
                const video = document.createElement('video');
                video.controls = true;
                video.playsInline = true;
                video.preload = 'auto';
                video.crossOrigin = 'anonymous';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.maxHeight = '65vh';
                video.style.objectFit = 'contain';
                video.style.outline = 'none';
                video.style.borderRadius = '0';

                // 监听错误
                video.addEventListener('error', (e) => {
                    const errorCodes = ['', '加载中止', '网络错误', '解码错误', '格式不支持'];
                    const code = video.error ? video.error.code : 0;
                    const msg = errorCodes[code] || '未知错误';
                    console.warn('视频播放错误:', msg, video.error);
                    if (code === 4) {
                        showToast('⚠️ 该视频格式可能不被浏览器支持，尝试其他文件', 'error');
                    }
                });

                video.addEventListener('loadedmetadata', () => {
                    console.log('视频元数据加载完成，时长:', video.duration);
                });

                video.addEventListener('canplay', () => {
                    console.log('视频可以开始播放');
                });

                playerContainer.appendChild(video);
                currentVideoElement = video;

                // 使用WebTorrent的流式播放
                try {
                    // getBlobURL 获取可流式播放的URL
                    const blobUrl = file.getBlobURL();
                    video.src = blobUrl;
                    video.load();

                    // 尝试自动播放
                    const playPromise = video.play();
                    if (playPromise) {
                        playPromise.catch((err) => {
                            console.log('自动播放被阻止，需要用户手动点击播放:', err.message);
                            // 这是正常的，浏览器策略限制
                        });
                    }
                } catch (err) {
                    console.error('获取blob URL失败:', err);
                    // 备用方案：使用renderTo
                    try {
                        file.renderTo(playerContainer, {
                            autoplay: true,
                            controls: true,
                            playsinline: true,
                        });
                        // 查找生成的video元素
                        setTimeout(() => {
                            const renderedVideo = playerContainer.querySelector('video');
                            if (renderedVideo && renderedVideo !== currentVideoElement) {
                                if (currentVideoElement) currentVideoElement.remove();
                                currentVideoElement = renderedVideo;
                                renderedVideo.playsInline = true;
                                renderedVideo.style.maxHeight = '65vh';
                                renderedVideo.style.objectFit = 'contain';
                            }
                        }, 300);
                    } catch (err2) {
                        console.error('renderTo也失败了:', err2);
                        showToast('无法播放该文件', 'error');
                    }
                }

                highlightPlayingFile(fileIndex);

                const fileName = file.name;
                const isPlayable = isPlayableVideo(fileName);
                if (!isPlayable && isVideoFile(fileName)) {
                    showToast('⚠️ ' + getFileExtension(fileName).toUpperCase() +
                        ' 格式可能不被浏览器原生支持，播放可能失败', 'info');
                }
            }

            // ============ 添加磁力链接 ============
            function addMagnet(magnetURI) {
                if (isActive) {
                    stopCurrentTask();
                    // 短暂延迟确保清理完成
                    setTimeout(() => addMagnetInternal(magnetURI), 300);
                } else {
                    addMagnetInternal(magnetURI);
                }
            }

            function addMagnetInternal(magnetURI) {
                const client = getClient();
                isActive = true;
                updateUIState(true);
                updateStatsDisplay(0, 0, 0, 0, 'connecting');
                fileList.innerHTML = '<div class="no-files-hint">⏳ 正在获取种子元数据...</div>';
                fileCount.textContent = '...';
                playerPlaceholder.style.display = 'flex';
                if (playerPlaceholder.querySelector('.ph-text')) {
                    playerPlaceholder.querySelector('.ph-text').textContent = '正在连接节点...';
                }

                // 清理之前的视频
                if (currentVideoElement) {
                    try { currentVideoElement.pause();
                        currentVideoElement.remove(); } catch (e) {}
                    currentVideoElement = null;
                }
                currentFileIndex = -1;

                const startTime = Date.now();
                let metadataReceived = false;

                client.add(magnetURI, { announce: [] }, (torrent) => {
                    currentTorrent = torrent;
                    console.log('Torrent添加成功:', torrent.name || torrent.infoHash);

                    // 元数据事件
                    torrent.on('metadata', () => {
                        metadataReceived = true;
                        console.log('元数据加载完成，文件数:', torrent.files.length);
                        renderFileList(torrent);
                        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                        showToast(`✅ 元数据加载完成 (${elapsed}s)，共 ${torrent.files.length} 个文件`, 'success');
                    });

                    // 准备就绪
                    torrent.on('ready', () => {
                        console.log('Torrent就绪，开始下载');
                        if (!metadataReceived && torrent.files.length > 0) {
                            renderFileList(torrent);
                            metadataReceived = true;
                        }
                        updateStatsDisplay(0, 0, torrent.numPeers || 0, torrent.progress || 0,
                            'downloading');
                    });

                    // 下载进度更新
                    torrent.on('download', () => {
                        if (!isActive || !currentTorrent) return;
                        updateFileProgress(torrent);
                        const now = Date.now();
                        const interval = now - lastStatsTime;
                        if (interval > 800) {
                            const dlSpeed = torrent.downloadSpeed || 0;
                            const ulSpeed = torrent.uploadSpeed || 0;
                            const peers = torrent.numPeers || 0;
                            const progress = torrent.progress || 0;
                            updateStatsDisplay(dlSpeed, ulSpeed, peers, progress, 'downloading');
                            lastStatsTime = now;
                        }
                    });

                    // 上传事件
                    torrent.on('upload', () => {
                        // 与download合并处理
                    });

                    // 完成
                    torrent.on('done', () => {
                        console.log('下载完成！');
                        updateStatsDisplay(0, torrent.uploadSpeed || 0, torrent.numPeers || 0, 1,
                            'seeding');
                        showToast('🎉 下载完成！', 'success');
                        updateFileProgress(torrent);
                    });

                    // 新连接
                    torrent.on('wire', () => {
                        if (isActive && currentTorrent === torrent) {
                            peerCountEl.textContent = (torrent.numPeers || 0) + ' 节点';
                        }
                    });

                    // 错误
                    torrent.on('error', (err) => {
                        console.error('Torrent错误:', err);
                        showToast('❌ 错误: ' + (err.message || '未知错误'), 'error');
                    });

                    // 警告
                    torrent.on('warning', (warn) => {
                        console.warn('Torrent警告:', warn);
                    });

                    // 无更多节点
                    torrent.on('noPeers', () => {
                        console.log('暂无更多节点');
                        if (isActive && currentTorrent === torrent && torrent.progress < 1) {
                            updateStatsDisplay(torrent.downloadSpeed || 0, torrent.uploadSpeed || 0,
                                torrent.numPeers || 0, torrent.progress || 0, 'connecting');
                        }
                    });

                    // 如果元数据在短时间内已加载（可能在add回调之前）
                    if (torrent.files && torrent.files.length > 0 && !metadataReceived) {
                        metadataReceived = true;
                        renderFileList(torrent);
                    }

                    // 设置初始状态
                    updateStatsDisplay(0, 0, torrent.numPeers || 0, torrent.progress || 0, 'connecting');
                });
            }

            // ============ 验证磁力链接 ============
            function isValidMagnet(str) {
                if (!str || typeof str !== 'string') return false;
                const trimmed = str.trim();
                // 标准磁力链接
                if (/^magnet:\?xt=urn:btih:[a-zA-Z0-9]{32,40}/i.test(trimmed)) return true;
                // 仅info hash (40位hex或32位base32)
                if (/^[a-fA-F0-9]{40}$/.test(trimmed)) return true;
                if (/^[a-zA-Z2-7]{32}$/.test(trimmed)) return true;
                // 包含磁力链接的文本
                if (trimmed.includes('magnet:?xt=urn:btih:')) return true;
                return false;
            }

            function extractMagnet(str) {
                const trimmed = str.trim();
                // 如果已经是标准磁力链接
                if (/^magnet:\?xt=urn:btih:/i.test(trimmed)) return trimmed;
                // 如果是纯info hash
                if (/^[a-fA-F0-9]{40}$/.test(trimmed)) return 'magnet:?xt=urn:btih:' + trimmed;
                if (/^[a-zA-Z2-7]{32}$/.test(trimmed)) return 'magnet:?xt=urn:btih:' + trimmed;
                // 从文本中提取
                const match = trimmed.match(/magnet:\?xt=urn:btih:[^\s&]+/i);
                if (match) return match[0];
                return null;
            }

            // ============ 事件监听 ============
            btnParse.addEventListener('click', () => {
                const rawInput = magnetInput.value.trim();
                if (!rawInput) {
                    showToast('请粘贴磁力链接', 'info');
                    magnetInput.focus();
                    return;
                }
                if (!isValidMagnet(rawInput)) {
                    showToast('⚠️ 无效的磁力链接格式，请检查后重试', 'error');
                    magnetInput.focus();
                    return;
                }
                const magnet = extractMagnet(rawInput);
                if (!magnet) {
                    showToast('⚠️ 无法解析磁力链接', 'error');
                    return;
                }
                magnetInput.value = magnet;
                magnetInput.classList.add('has-value');
                addMagnet(magnet);
            });

            btnStop.addEventListener('click', () => {
                stopCurrentTask();
                showToast('已停止当前任务', 'info');
            });

            // 回车键提交
            magnetInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    btnParse.click();
                }
            });

            // 输入时检测
            magnetInput.addEventListener('input', () => {
                if (magnetInput.value.trim()) {
                    magnetInput.classList.add('has-value');
                } else {
                    magnetInput.classList.remove('has-value');
                }
            });

            // 粘贴事件 - 自动检测并清理
            magnetInput.addEventListener('paste', (e) => {
                setTimeout(() => {
                    const val = magnetInput.value.trim();
                    if (val && isValidMagnet(val)) {
                        const cleaned = extractMagnet(val);
                        if (cleaned) {
                            magnetInput.value = cleaned;
                            magnetInput.classList.add('has-value');
                        }
                    }
                }, 100);
            });

            // 页面卸载时清理
            window.addEventListener('beforeunload', () => {
                stopCurrentTask();
                if (webTorrentClient) {
                    try { webTorrentClient.destroy(); } catch (e) {}
                    webTorrentClient = null;
                }
            });

            // 页面隐藏时（移动端切换应用）不做清理，保持下载
            // 但可以做一些优化
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && currentVideoElement && !currentVideoElement.paused) {
                    // 可选：后台继续播放或暂停
                    // 这里保持播放，因为用户可能在听音频
                }
            });

            // ============ 初始状态 ============
            updateUIState(false);
            magnetInput.focus();

            // ============ 暴露API到全局 ============
            window.MagnetPlayer = {
                addMagnet,
                stop: stopCurrentTask,
                getStatus: () => ({
                    isActive,
                    torrentName: currentTorrent ? (currentTorrent.name || currentTorrent.infoHash) : null,
                    progress: currentTorrent ? currentTorrent.progress : 0,
                    downloadSpeed: currentTorrent ? currentTorrent.downloadSpeed : 0,
                    uploadSpeed: currentTorrent ? currentTorrent.uploadSpeed : 0,
                    peers: currentTorrent ? currentTorrent.numPeers : 0,
                    files: currentTorrent ? currentTorrent.files.length : 0,
                }),
            };

            console.log('🎬 Magnet Player 初始化完成');
            console.log('   WebTorrent版本:', WebTorrent.VERSION || 'latest');
            console.log('   支持WebRTC:', !!(window.RTCPeerConnection || window.webkitRTCPeerConnection ||
                window.mozRTCPeerConnection));
            console.log('   💡 提示：粘贴磁力链接后点击"解析播放"或按回车键');
            console.log('   📝 测试磁力链接示例 (开源电影Big Buck Bunny):');
            console.log('   magnet:?xt=urn:btih:dd8255ecdc7ca55fb0bbf81323d87062db1f6d1c&dn=Big+Buck+Bunny&tr=udp%3A%2F%2Ftracker.openbittorrent.com%3A80&tr=udp%3A%2F%2Ftracker.publicbt.com%3A80');
        })();
    </script>
