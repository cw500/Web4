<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>加密聊天室 · 128位密钥验证</title>

  <!-- Supabase SDK (可选，启用后支持多设备实时通信) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>

  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --bg-card: #16161f;
      --bg-input: #1a1a26;
      --border: #252535;
      --text-primary: #e8e8f0;
      --text-secondary: #9a9ab0;
      --text-muted: #5a5a70;
      --accent: #4f8fff;
      --accent-glow: #4f8fff55;
      --danger: #e94560;
      --danger-glow: #e9456055;
      --success: #2ecc71;
      --my-msg-bg: #1a3a5c;
      --other-msg-bg: #1e1e2c;
      --radius-sm: 8px;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --safe-bottom: env(safe-area-inset-bottom, 12px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    #auth-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      z-index: 1000;
      padding: 20px;
      transition: opacity 0.4s, transform 0.4s;
    }
    #auth-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 36px 28px 32px;
      box-shadow: var(--shadow), 0 0 60px var(--accent-glow);
      border: 1px solid var(--border);
      text-align: center;
    }
    .auth-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #1a3a5c, #0f2847);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      border: 2px solid var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .auth-input-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .auth-input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 1rem;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', 'PingFang SC', monospace;
      letter-spacing: 0.04em;
      transition: var(--transition);
      outline: none;
      text-align: center;
    }
    .auth-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .auth-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 20px var(--danger-glow);
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0);}
      20%{transform:translateX(-8px);}
      40%{transform:translateX(8px);}
      60%{transform:translateX(-5px);}
      80%{transform:translateX(5px);}
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--text-muted);
      padding: 6px;
      z-index: 2;
      transition: var(--transition);
    }
    .toggle-password:hover {
      color: var(--text-primary);
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, #1a5cbf, #0f3d8e);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(79,143,255,0.3);
    }
    .auth-btn:hover {
      box-shadow: 0 6px 24px rgba(79,143,255,0.45);
      transform: translateY(-1px);
    }
    .auth-btn:active {
      transform: scale(0.97);
    }
    .auth-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .auth-error-msg {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 20px;
    }
    .auth-attempts {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    #chat-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    #chat-screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    .chat-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top, 12px));
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      gap: 10px;
    }
    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .chat-room-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3a5c, #0f2847);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      border: 2px solid var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .chat-room-info {
      min-width: 0;
    }
    .chat-room-name {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-room-status {
      font-size: 0.72rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100%{box-shadow:0 0 0 0 rgba(46,204,113,0.6);}
      50%{box-shadow:0 0 0 8px rgba(46,204,113,0);}
    }
    .header-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .header-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--text-secondary);
    }
    .header-btn:hover {
      background: var(--bg-input);
      color: var(--text-primary);
    }
    .header-btn.danger:hover {
      background: #3d1520;
      border-color: var(--danger);
      color: var(--danger);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: msg-in 0.3s ease;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-wrapper.mine {
      align-self: flex-end;
      align-items: flex-end;
    }
    .msg-wrapper.other {
      align-self: flex-start;
      align-items: flex-start;
    }
    .msg-sender {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 3px;
      padding: 0 4px;
      font-weight: 500;
    }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      word-break: break-word;
      line-height: 1.5;
      font-size: 0.93rem;
    }
    .msg-wrapper.mine .msg-bubble {
      background: var(--my-msg-bg);
      border-bottom-right-radius: 4px;
      color: #d0e0ff;
      box-shadow: 0 2px 8px rgba(79,143,255,0.15);
    }
    .msg-wrapper.other .msg-bubble {
      background: var(--other-msg-bg);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      border: 1px solid var(--border);
    }
    .msg-image {
      max-width: 240px;
      max-height: 320px;
      border-radius: 10px;
      cursor: pointer;
      display: block;
      object-fit: cover;
      border: 1px solid var(--border);
      transition: var(--transition);
    }
    .msg-image:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .msg-image-wrap {
      position: relative;
      display: inline-block;
      border-radius: 10px;
      overflow: hidden;
    }
    .msg-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg-wrapper.mine .msg-time {
      text-align: right;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .image-modal.active {
      opacity: 1;
      pointer-events: auto;
    }
    .image-modal img {
      max-width: 94vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .image-modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 2001;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-input-area {
      flex-shrink: 0;
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bottom));
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      z-index: 10;
    }
    .input-upload-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: var(--transition);
      color: var(--text-secondary);
      position: relative;
    }
    .input-upload-btn:hover {
      background: var(--bg-input);
      color: var(--accent);
      border-color: var(--accent);
    }
    .input-upload-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .chat-textarea-wrap {
      flex: 1;
      position: relative;
      background: var(--bg-input);
      border-radius: 22px;
      border: 1px solid var(--border);
      transition: var(--transition);
      display: flex;
      align-items: flex-end;
      min-height: 42px;
    }
    .chat-textarea-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .chat-textarea {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 0.93rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
      min-height: 38px;
      -webkit-user-select: text;
      user-select: text;
    }
    .chat-textarea::placeholder {
      color: var(--text-muted);
    }
    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px var(--accent-glow);
    }
    .send-btn:hover {
      box-shadow: 0 5px 20px var(--accent-glow);
      transform: translateY(-1px);
    }
    .send-btn:active {
      transform: scale(0.9);
    }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .preview-bubble {
      position: absolute;
      bottom: 100%;
      left: 12px;
      margin-bottom: 8px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 8px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 20;
      animation: msg-in 0.25s ease;
    }
    .preview-bubble img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .preview-bubble .remove-preview {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--danger);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toast {
      position: fixed;
      top: 20px;
      top: calc(20px + env(safe-area-inset-top, 20px));
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      z-index: 3000;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      animation: toast-in 0.3s ease, toast-out 0.3s ease 2.5s forwards;
      pointer-events: none;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toast-out {
      from { opacity: 1; }
      to { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 28px 18px 24px;
      }
      .msg-wrapper { max-width: 90%; }
      .msg-image { max-width: 180px; max-height: 240px; }
      .chat-input-area { padding: 8px 8px; padding-bottom: calc(8px + var(--safe-bottom)); gap: 5px; }
      .send-btn { width: 38px; height: 38px; }
      .input-upload-btn { width: 36px; height: 36px; }
    }
    @media (min-width: 768px) {
      .chat-messages { padding: 20px 24px; gap: 10px; }
      .msg-wrapper { max-width: 70%; }
      .msg-image { max-width: 300px; max-height: 400px; }
    }
    @media (min-width: 1024px) {
      .msg-wrapper { max-width: 55%; }
      .chat-messages { padding: 24px 32px; }
    }
  </style>
</head>
<body>

<!-- 密钥验证界面 -->
<div id="auth-screen">
  <div class="auth-container">
    <div class="auth-icon">🔐</div>
    <h1 class="auth-title">加密聊天室</h1>
    <p class="auth-subtitle">输入密钥进入（支持任意长度）<br>默认密钥：<strong>test</strong></p>
    <div class="auth-input-wrap">
      <input type="password" id="auth-key-input" class="auth-input" placeholder="输入密钥" maxlength="128" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="toggle-password" id="toggle-password-btn" title="显示/隐藏密钥">👁️</button>
    </div>
    <button class="auth-btn" id="auth-submit-btn">🔓 验证进入</button>
    <p class="auth-error-msg" id="auth-error-msg"></p>
    <p class="auth-attempts" id="auth-attempts"></p>
  </div>
</div>

<!-- 聊天主界面 -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-room-icon">💬</div>
      <div class="chat-room-info">
        <div class="chat-room-name">加密聊天室</div>
        <div class="chat-room-status">
          <span class="status-dot"></span>
          <span id="online-count">在线: --</span>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btn-scroll-bottom" title="滚动到底部">⬇️</button>
      <button class="header-btn danger" id="btn-leave" title="退出聊天室">🚪</button>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div style="text-align:center;color:var(--text-muted);font-size:0.8rem;padding:30px 0;">🔒 安全通道已建立<br>开始发送消息吧</div>
  </div>

  <div class="chat-input-area" id="chat-input-area">
    <div class="input-upload-btn" title="发送图片">
      📷
      <input type="file" id="image-input" accept="image/*" capture="environment">
    </div>
    <div class="chat-textarea-wrap" id="textarea-wrap">
      <textarea class="chat-textarea" id="chat-textarea" rows="1" placeholder="输入消息..." maxlength="2000"></textarea>
    </div>
    <button class="send-btn" id="send-btn" title="发送">➤</button>
  </div>
</div>

<div class="image-modal" id="image-modal">
  <button class="image-modal-close" id="image-modal-close">✕</button>
  <img src="" alt="预览图片" id="image-modal-img">
</div>

<div id="toast-container"></div>

<script>
(function() {
  // ==================== 安全配置 ====================
  // 预设密钥的 SHA-256 哈希（此处为字符串 "test" 的 SHA-256）
  const PRESET_KEY_HASH = '9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08';
  // 非安全环境（如 file://）下的明文回退密钥（仅供本地测试，部署到 HTTPS 后请删除此行）
  const PLAIN_KEY_FALLBACK = 'test';

  const SECURITY_CONFIG = {
    maxAttempts: 5,
    lockoutDuration: 30000,
    messageRateLimit: 1500,
    maxImageSize: 5 * 1024 * 1024,
    imageMaxWidth: 800,
    imageQuality: 0.65,
    maxMessageLength: 2000,
    heartbeatInterval: 30000,
  };

  // Supabase 配置（免费BaaS，实现多设备实时通信）
  const SUPABASE_CONFIG = {
    url: 'https://your-project-id.supabase.co',   // 替换为你的项目URL
    anonKey: 'your-anon-key-here',                // 替换为你的匿名公钥
    enabled: false,                               // 改为 true 启用 Supabase 模式
  };

  // ==================== DOM 元素 ====================
  const $ = (s) => document.querySelector(s);
  const authScreen = $('#auth-screen');
  const authKeyInput = $('#auth-key-input');
  const authSubmitBtn = $('#auth-submit-btn');
  const authErrorMsg = $('#auth-error-msg');
  const authAttempts = $('#auth-attempts');
  const togglePasswordBtn = $('#toggle-password-btn');
  const chatScreen = $('#chat-screen');
  const chatMessages = $('#chat-messages');
  const chatTextarea = $('#chat-textarea');
  const sendBtn = $('#send-btn');
  const imageInput = $('#image-input');
  const onlineCount = $('#online-count');
  const imageModal = $('#image-modal');
  const imageModalImg = $('#image-modal-img');
  const imageModalClose = $('#image-modal-close');
  const textareaWrap = $('#textarea-wrap');
  const btnScrollBottom = $('#btn-scroll-bottom');
  const btnLeave = $('#btn-leave');

  // 状态变量
  let failedAttempts = 0;
  let lockoutUntil = 0;
  let userIpHash = null;
  let userDisplayName = null;
  let lastMessageTime = 0;
  let pendingImage = null;
  let previewBubbleEl = null;
  let isSupabaseMode = false;
  let supabase = null;
  let realtimeChannel = null;
  let heartbeatTimer = null;
  let knownMessageIds = new Set();
  let localMessageIdCounter = 0;

  // ==================== 工具函数 ====================
  async function sha256(message) {
    if (window.crypto && window.crypto.subtle) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    } else {
      // 非安全环境回退（不可靠，仅用于本地测试）
      return simpleHash(message);
    }
  }

  function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      const char = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
      hash |= 0;
    }
    let h1 = Math.abs(hash).toString(16).padStart(8, '0');
    let h2 = Math.abs(hash * 31 + 7).toString(16).padStart(8, '0');
    let h3 = Math.abs(hash * 17 + 13).toString(16).padStart(8, '0');
    let h4 = Math.abs(hash * 53 + 3).toString(16).padStart(8, '0');
    let h5 = Math.abs(hash * 79 + 19).toString(16).padStart(8, '0');
    let h6 = Math.abs(hash * 101 + 29).toString(16).padStart(8, '0');
    let h7 = Math.abs(hash * 127 + 37).toString(16).padStart(8, '0');
    let h8 = Math.abs(hash * 151 + 43).toString(16).padStart(8, '0');
    return h1 + h2 + h3 + h4 + h5 + h6 + h7 + h8;
  }

  async function getUserIp() {
    const services = [
      'https://api.ipify.org?format=json',
      'https://api64.ipify.org?format=json',
    ];
    for (const url of services) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 4000);
        const resp = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!resp.ok) continue;
        const data = await resp.json();
        if (data.ip) return data.ip;
      } catch (e) { continue; }
    }
    return 'unknown-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
  }

  function generateDisplayName(ipHash) {
    const short = ipHash.slice(0, 8).toUpperCase();
    const colors = ['🔵','🟢','🟡','🟣','🟠','🔴','⚪','🟤','🔷','💠'];
    const colorIndex = parseInt(ipHash.slice(0,4), 16) % colors.length;
    return `${colors[colorIndex]} 用户·${short}`;
  }

  function formatTime(date) {
    const d = new Date(date);
    return d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
  }

  function showToast(msg, duration=2800) {
    const container = $('#toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, duration+400);
  }

  // ==================== 图片处理 ====================
  function compressImage(file) {
    return new Promise((resolve, reject) => {
      if (file.size > SECURITY_CONFIG.maxImageSize) return reject(new Error('图片不能超过5MB'));
      if (!file.type.startsWith('image/')) return reject(new Error('仅支持图片格式'));
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          const maxW = SECURITY_CONFIG.imageMaxWidth;
          if (width > maxW) {
            height = Math.round((height * maxW) / width);
            width = maxW;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          const base64 = canvas.toDataURL('image/jpeg', SECURITY_CONFIG.imageQuality);
          resolve({ base64, width, height });
        };
        img.onerror = () => reject(new Error('图片加载失败'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('文件读取失败'));
      reader.readAsDataURL(file);
    });
  }

  // ==================== Supabase 集成 ====================
  function initSupabase() {
    if (!SUPABASE_CONFIG.enabled) return false;
    if (!SUPABASE_CONFIG.url.includes('supabase.co')) return false;
    try {
      supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
      isSupabaseMode = true;
      console.log('✅ Supabase 实时模式已启用');
      return true;
    } catch (e) {
      console.warn('Supabase 初始化失败', e);
      return false;
    }
  }

  async function supabaseLoadMessages() {
    if (!isSupabaseMode) return [];
    try {
      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .order('created_at', { ascending: true })
        .limit(200);
      if (error) throw error;
      return data || [];
    } catch (e) {
      console.warn('加载消息失败', e);
      return [];
    }
  }

  async function supabaseSendMessage(msgData) {
    const { data, error } = await supabase
      .from('messages')
      .insert([msgData])
      .select()
      .single();
    if (error) throw error;
    return data;
  }

  function supabaseSubscribe(callback) {
    if (!isSupabaseMode) return;
    realtimeChannel = supabase
      .channel('public:messages')
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload => {
        const newMsg = payload.new;
        if (newMsg && !knownMessageIds.has(newMsg.id)) {
          knownMessageIds.add(newMsg.id);
          callback(newMsg);
        }
      })
      .subscribe();
  }

  function supabaseUnsubscribe() {
    if (realtimeChannel) {
      try { supabase.removeChannel(realtimeChannel); } catch(e) {}
      realtimeChannel = null;
    }
  }

  // ==================== 本地存储模式 ====================
  function getLocalMessages() {
    try {
      return JSON.parse(localStorage.getItem('secure_chat_messages') || '[]');
    } catch(e) { return []; }
  }

  function saveLocalMessages(messages) {
    try {
      localStorage.setItem('secure_chat_messages', JSON.stringify(messages.slice(-300)));
    } catch(e) {}
  }

  function addLocalMessage(msgData) {
    const messages = getLocalMessages();
    const newMsg = {
      ...msgData,
      id: 'local_' + (++localMessageIdCounter) + '_' + Date.now(),
      created_at: new Date().toISOString()
    };
    messages.push(newMsg);
    saveLocalMessages(messages);
    window.dispatchEvent(new CustomEvent('local-chat-message', { detail: newMsg }));
    return newMsg;
  }

  // ==================== 消息渲染 ====================
  function renderMessage(msg) {
    if (knownMessageIds.has(msg.id)) return;
    knownMessageIds.add(msg.id);

    const isMine = msg.ip_hash === userIpHash;
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'other'}`;
    wrapper.dataset.msgId = msg.id;

    const senderEl = document.createElement('span');
    senderEl.className = 'msg-sender';
    senderEl.textContent = isMine ? '我' : (msg.username || '匿名用户');
    wrapper.appendChild(senderEl);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (msg.image) {
      const imgWrap = document.createElement('div');
      imgWrap.className = 'msg-image-wrap';
      const img = document.createElement('img');
      img.className = 'msg-image';
      img.src = msg.image;
      img.loading = 'lazy';
      img.onclick = () => openImagePreview(msg.image);
      img.onerror = function() {
        this.style.display = 'none';
        const fallback = document.createElement('span');
        fallback.textContent = '📷 [图片加载失败]';
        fallback.style.color = 'var(--text-muted)';
        fallback.style.fontSize = '0.85rem';
        imgWrap.appendChild(fallback);
      };
      imgWrap.appendChild(img);
      bubble.appendChild(imgWrap);
    }

    if (msg.content && msg.content.trim()) {
      const textEl = document.createElement('span');
      textEl.textContent = msg.content;
      bubble.appendChild(textEl);
    }

    wrapper.appendChild(bubble);

    const timeEl = document.createElement('span');
    timeEl.className = 'msg-time';
    timeEl.textContent = formatTime(msg.created_at);
    wrapper.appendChild(timeEl);

    chatMessages.appendChild(wrapper);
  }

  function scrollToBottom(smooth = true) {
    requestAnimationFrame(() => {
      chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
    });
  }

  function openImagePreview(src) {
    imageModalImg.src = src;
    imageModal.classList.add('active');
  }
  function closeImagePreview() {
    imageModal.classList.remove('active');
    imageModalImg.src = '';
  }

  // ==================== 发送消息 ====================
  async function sendMessage() {
    const content = chatTextarea.value.trim();
    const image = pendingImage?.base64 || null;
    if (!content && !image) return;

    const now = Date.now();
    if (now - lastMessageTime < SECURITY_CONFIG.messageRateLimit) {
      return showToast('⏳ 发送太快，请稍后');
    }

    const msgData = {
      ip_hash: userIpHash,
      username: userDisplayName,
      content: content || '',
      image: image || null,
    };

    sendBtn.disabled = true;
    chatTextarea.disabled = true;

    try {
      if (isSupabaseMode) {
        const result = await supabaseSendMessage(msgData);
        if (result) {
          knownMessageIds.add(result.id);
          renderMessage({...result, id: result.id});
        }
      } else {
        const localMsg = addLocalMessage(msgData);
        renderMessage(localMsg);
      }

      lastMessageTime = Date.now();
      chatTextarea.value = '';
      clearPendingImage();
      chatTextarea.style.height = 'auto';
      chatTextarea.focus();
      scrollToBottom(true);
      updateOnlineCount();
    } catch (e) {
      showToast('❌ 发送失败: ' + e.message);
    } finally {
      sendBtn.disabled = false;
      chatTextarea.disabled = false;
    }
  }

  function clearPendingImage() {
    pendingImage = null;
    if (previewBubbleEl?.parentNode) previewBubbleEl.remove();
    previewBubbleEl = null;
    imageInput.value = '';
  }

  function showImagePreview(file, compressed) {
    clearPendingImage();
    pendingImage = compressed;
    previewBubbleEl = document.createElement('div');
    previewBubbleEl.className = 'preview-bubble';
    const img = document.createElement('img');
    img.src = compressed.base64;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-preview';
    removeBtn.textContent = '✕';
    removeBtn.onclick = (e) => { e.stopPropagation(); clearPendingImage(); };
    previewBubbleEl.appendChild(img);
    previewBubbleEl.appendChild(removeBtn);
    textareaWrap.appendChild(previewBubbleEl);
  }

  // ==================== 在线人数 ====================
  function updateOnlineCount() {
    if (isSupabaseMode) {
      supabase
        .from('messages')
        .select('ip_hash', { count:'exact', head:true })
        .gte('created_at', new Date(Date.now() - 5*60*1000).toISOString())
        .then(({ count }) => {
          onlineCount.textContent = `在线: ~${Math.max(1, Math.ceil(count/3))}人`;
        })
        .catch(() => { onlineCount.textContent = '在线: --'; });
    } else {
      const messages = getLocalMessages();
      const recentIps = new Set();
      const fiveMinAgo = Date.now() - 5*60*1000;
      messages.forEach(m => {
        if (new Date(m.created_at).getTime() > fiveMinAgo) recentIps.add(m.ip_hash);
      });
      onlineCount.textContent = `在线: ${Math.max(1, recentIps.size)}人 (本地)`;
    }
  }

  // ==================== 密钥验证 ====================
  async function handleAuthSubmit() {
    const now = Date.now();
    if (now < lockoutUntil) {
      const remaining = Math.ceil((lockoutUntil - now) / 1000);
      authErrorMsg.textContent = `⛔ 已锁定，请等待 ${remaining} 秒`;
      return;
    }

    const inputKey = authKeyInput.value.trim().replace(/\s+/g, '').replace(/-/g, '');
    if (!inputKey) {
      authErrorMsg.textContent = '请输入密钥';
      authKeyInput.classList.add('error');
      setTimeout(() => authKeyInput.classList.remove('error'), 500);
      return;
    }

    authSubmitBtn.disabled = true;
    authSubmitBtn.textContent = '🔍 验证中...';

    try {
      let isMatch = false;

      // 安全环境：SHA-256 哈希比对
      if (window.crypto && window.crypto.subtle) {
        const inputHash = await sha256(inputKey.toLowerCase());
        isMatch = (inputHash === PRESET_KEY_HASH);
      } else {
        // 非安全环境 (file://) 明文回退（仅供测试！）
        console.warn('⚠️ 非安全环境，使用明文比对（仅用于本地调试）');
        isMatch = (inputKey.toLowerCase() === PLAIN_KEY_FALLBACK.toLowerCase());
      }

      if (isMatch) {
        failedAttempts = 0;
        updateAttemptsDisplay();
        authErrorMsg.textContent = '';
        await onAuthSuccess();
      } else {
        failedAttempts++;
        updateAttemptsDisplay();
        if (failedAttempts >= SECURITY_CONFIG.maxAttempts) {
          lockoutUntil = Date.now() + SECURITY_CONFIG.lockoutDuration;
          authErrorMsg.textContent = `⛔ 尝试次数过多，已锁定 ${SECURITY_CONFIG.lockoutDuration/1000} 秒`;
          authAttempts.textContent = '';
        } else {
          authErrorMsg.textContent = `❌ 密钥错误，还剩 ${SECURITY_CONFIG.maxAttempts - failedAttempts} 次机会`;
        }
        authKeyInput.classList.add('error');
        setTimeout(() => authKeyInput.classList.remove('error'), 500);
        authKeyInput.value = '';
        authKeyInput.focus();
      }
    } catch (e) {
      authErrorMsg.textContent = '验证出错，请重试';
    } finally {
      authSubmitBtn.disabled = false;
      authSubmitBtn.textContent = '🔓 验证进入';
    }
  }

  function updateAttemptsDisplay() {
    if (failedAttempts > 0 && failedAttempts < SECURITY_CONFIG.maxAttempts) {
      authAttempts.textContent = `已尝试: ${failedAttempts}/${SECURITY_CONFIG.maxAttempts}`;
    } else {
      authAttempts.textContent = '';
    }
  }

  async function onAuthSuccess() {
    try {
      const ip = await getUserIp();
      userIpHash = await sha256(ip);
    } catch(e) {
      userIpHash = await sha256('fallback-' + Date.now());
    }
    userDisplayName = generateDisplayName(userIpHash);
    console.log('🔑 身份:', userDisplayName);

    await initChat();

    authScreen.classList.add('hidden');
    chatScreen.classList.add('active');
    chatTextarea.focus();
    setTimeout(() => showToast(`👋 欢迎，${userDisplayName}`), 500);
  }

  // ==================== 聊天初始化与清理 ====================
  async function initChat() {
    chatMessages.innerHTML = '';
    knownMessageIds.clear();
    const placeholder = document.createElement('div');
    placeholder.style.cssText = 'text-align:center;color:var(--text-muted);font-size:0.8rem;padding:30px 0;';
    placeholder.textContent = '🔒 安全通道已建立\n正在加载消息...';
    chatMessages.appendChild(placeholder);

    if (isSupabaseMode) {
      const messages = await supabaseLoadMessages();
      chatMessages.innerHTML = '';
      if (messages.length === 0) {
        const emptyDiv = document.createElement('div');
        emptyDiv.style.cssText = 'text-align:center;color:var(--text-muted);font-size:0.8rem;padding:30px 0;';
        emptyDiv.textContent = '🔒 安全通道已建立\n开始发送消息吧';
        chatMessages.appendChild(emptyDiv);
      }
      messages.forEach(msg => { knownMessageIds.add(msg.id); renderMessage(msg); });
      supabaseSubscribe((newMsg) => {
        if (newMsg.ip_hash !== userIpHash) {
          renderMessage(newMsg);
          scrollToBottom(true);
          updateOnlineCount();
        }
      });
      heartbeatTimer = setInterval(updateOnlineCount, SECURITY_CONFIG.heartbeatInterval);
    } else {
      const messages = getLocalMessages();
      chatMessages.innerHTML = '';
      if (messages.length === 0) {
        const emptyDiv = document.createElement('div');
        emptyDiv.style.cssText = 'text-align:center;color:var(--text-muted);font-size:0.8rem;padding:30px 0;';
        emptyDiv.textContent = '💻 本地模式 - 同设备标签页可实时通信';
        chatMessages.appendChild(emptyDiv);
      }
      messages.forEach(msg => { knownMessageIds.add(msg.id); renderMessage(msg); });
      window.addEventListener('local-chat-message', (e) => {
        const msg = e.detail;
        if (msg.ip_hash !== userIpHash && !knownMessageIds.has(msg.id)) {
          knownMessageIds.add(msg.id);
          renderMessage(msg);
          scrollToBottom(true);
          updateOnlineCount();
        }
      });
      window.addEventListener('storage', (e) => {
        if (e.key === 'secure_chat_messages') {
          const messages = getLocalMessages();
          messages.forEach(msg => {
            if (!knownMessageIds.has(msg.id) && msg.ip_hash !== userIpHash) {
              knownMessageIds.add(msg.id);
              renderMessage(msg);
            }
          });
          scrollToBottom(true);
          updateOnlineCount();
        }
      });
      heartbeatTimer = setInterval(updateOnlineCount, SECURITY_CONFIG.heartbeatInterval);
    }
    scrollToBottom(false);
    updateOnlineCount();
  }

  function cleanupChat() {
    supabaseUnsubscribe();
    clearInterval(heartbeatTimer);
    heartbeatTimer = null;
    knownMessageIds.clear();
    clearPendingImage();
  }

  function handleLeave() {
    if (confirm('确定退出聊天室吗？')) {
      cleanupChat();
      chatScreen.classList.remove('active');
      authScreen.classList.remove('hidden');
      userIpHash = null;
      userDisplayName = null;
      chatMessages.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px;">🔒 安全通道已建立<br>开始发送消息吧</div>';
      onlineCount.textContent = '在线: --';
      authKeyInput.focus();
      showToast('👋 已退出');
    }
  }

  // ==================== 事件绑定 ====================
  authSubmitBtn.addEventListener('click', handleAuthSubmit);
  authKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); handleAuthSubmit(); } });
  togglePasswordBtn.addEventListener('click', () => {
    const isPassword = authKeyInput.type === 'password';
    authKeyInput.type = isPassword ? 'text' : 'password';
    togglePasswordBtn.textContent = isPassword ? '🙈' : '👁️';
  });

  sendBtn.addEventListener('click', sendMessage);
  chatTextarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  chatTextarea.addEventListener('input', () => {
    chatTextarea.style.height = 'auto';
    chatTextarea.style.height = Math.min(chatTextarea.scrollHeight, 120) + 'px';
  });

  imageInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      showToast('🖼️ 处理图片中...');
      const compressed = await compressImage(file);
      showImagePreview(file, compressed);
      showToast('✅ 图片已就绪');
      chatTextarea.focus();
    } catch (err) { showToast('❌ ' + err.message); imageInput.value = ''; }
  });

  document.addEventListener('paste', async (e) => {
    if (!chatScreen.classList.contains('active')) return;
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        try {
          const compressed = await compressImage(file);
          showImagePreview(file, compressed);
          showToast('✅ 图片已粘贴');
          chatTextarea.focus();
        } catch (err) { showToast('❌ ' + err.message); }
        break;
      }
    }
  });

  imageModal.addEventListener('click', (e) => { if (e.target === imageModal || e.target === imageModalClose) closeImagePreview(); });
  imageModalClose.addEventListener('click', closeImagePreview);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && imageModal.classList.contains('active')) closeImagePreview(); });

  btnScrollBottom.addEventListener('click', () => scrollToBottom(true));
  btnLeave.addEventListener('click', handleLeave);

  // ==================== 启动 ====================
  function boot() {
    initSupabase(); // 尝试 Supabase
    authScreen.classList.remove('hidden');
    chatScreen.classList.remove('active');
    authKeyInput.focus();

    if (Date.now() < lockoutUntil) {
      const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
      authErrorMsg.textContent = `⛔ 已锁定，请等待 ${remaining} 秒`;
      authSubmitBtn.disabled = true;
      const interval = setInterval(() => {
        if (Date.now() >= lockoutUntil) {
          authErrorMsg.textContent = '';
          authSubmitBtn.disabled = false;
          failedAttempts = 0;
          clearInterval(interval);
        }
      }, 1000);
    }
    console.log('🔐 加密聊天室就绪 | 默认密钥: test');
  }

  boot();
})();
</script>
</body>
